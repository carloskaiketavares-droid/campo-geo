<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Campo GEO</title>
<link rel="manifest" href="manifest.json">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0a0e1a;color:#c8d6e5;min-height:100vh;padding:16px}.card{background:#111827;border:1px solid #1e2a4a;border-radius:10px;padding:14px;margin-bottom:10px}.btn{padding:12px 16px;border-radius:8px;border:none;cursor:pointer;color:#fff;font-weight:700;font-size:14px;width:100%}input,select{width:100%;padding:10px;border-radius:6px;border:1px solid #1e2a4a;background:#0f172a;color:#e2e8f0;font-size:14px}canvas{display:none}.gps{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}.stat{flex:1;background:#0f172a;border:1px solid #1e2a4a;border-radius:6px;padding:8px;text-align:center}.thumb{width:60px;height:60px;object-fit:cover;border-radius:4px}.log{background:#050810;border:1px solid #1e2a4a;border-radius:6px;padding:8px;max-height:120px;overflow:auto;font-size:10px}</style>
</head>
<body>
<div id="app"></div><canvas id="wc"></canvas>
<input type="file" id="cam" accept="image/*" capture="environment" style="display:none">
<input type="file" id="logo" accept="image/png,image/jpeg" style="display:none">
<script>
const API="https://script.google.com/macros/s/AKfycbx8BehYWILdRbQi8mCv4ImGQz1gmD3I7DFESABkaiT-goB1-b-dcDL1IuqjxlDu56QM/exec";
const PJ=[{id:"rio",name:"Rio das Ostras",f:"RIO_DAS_OSTRAS"},{id:"mar",name:"Marica",f:"MARICA"},{id:"imp",name:"IMPLURB Manaus",f:"ADESAO_IMPLURB_MANAUS"},{id:"g2",name:"Grupo 2 Cabos",f:"ADESAO_CIDADES_GRUPO_2_CABOS"}];
let S={scr:"setup",pj:null,op:"",ph:[],gps:null,gs:"idle",log:[],cad:[],done:false,proc:false,logoUrl:localStorage.getItem("cg_logo")||null,logoPos:localStorage.getItem("cg_lp")||"bottom-right",gkey:localStorage.getItem("cg_gkey")||""};

function lg(m,t="i"){S.log.push({m,t,ts:new Date().toLocaleTimeString("pt-BR")});render()}

async function geo(la,lo){
  // Google Maps Geocoding API
  if(S.gkey){
    try{
      const r=await fetch("https://maps.googleapis.com/maps/api/geocode/json?latlng="+la+","+lo+"&language=pt-BR&key="+S.gkey);
      const d=await r.json();
      if(d.status==="OK"&&d.results&&d.results.length>0){
        const c=d.results[0].address_components;
        const get=(t)=>{const f=c.find(x=>x.types.includes(t));return f?f.long_name:""};
        return{
          rua:get("route")||"Sem rua",
          numero:get("street_number")||"",
          bairro:get("sublocality_level_1")||get("sublocality")||get("neighborhood")||"Sem bairro",
          cidade:get("administrative_area_level_2")||get("locality")||"Sem cidade",
          estado:get("administrative_area_level_1")||"",
          cep:get("postal_code")||"",
          full:d.results[0].formatted_address||""
        };
      }
    }catch(e){lg("Google API erro: "+e.message,"err")}
  }
  // Fallback Nominatim
  try{
    const r=await fetch("https://nominatim.openstreetmap.org/reverse?lat="+la+"&lon="+lo+"&format=json&addressdetails=1");
    const d=await r.json();
    return{rua:d.address?.road||"?",numero:d.address?.house_number||"",bairro:d.address?.suburb||d.address?.neighbourhood||"?",cidade:d.address?.city||d.address?.town||"?",estado:d.address?.state||"",cep:d.address?.postcode||"",full:d.display_name||""}
  }catch{return{rua:"?",numero:"",bairro:"?",cidade:"?",estado:"",cep:"",full:"?"}}
}

function wm(img){return new Promise(res=>{if(!S.logoUrl)return res(img);const c=document.getElementById("wc"),ctx=c.getContext("2d"),i=new Image;i.onload=()=>{c.width=i.width;c.height=i.height;ctx.drawImage(i,0,0);const l=new Image;l.onload=()=>{const mw=i.width*.25,sc=Math.min(mw/l.width,1),lw=l.width*sc,lh=l.height*sc,p=20;let x=i.width-lw-p,y=i.height-lh-p;if(S.logoPos=="top-left"){x=p;y=p}else if(S.logoPos=="top-right"){x=i.width-lw-p;y=p}else if(S.logoPos=="bottom-left"){x=p}ctx.globalAlpha=.85;ctx.drawImage(l,x,y,lw,lh);ctx.globalAlpha=1;ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(0,i.height-46,i.width,46);ctx.fillStyle="#fff";ctx.font="bold 13px monospace";ctx.fillText(new Date().toLocaleString("pt-BR")+"  |  "+(S.gps?S.gps.lat.toFixed(5)+","+S.gps.lng.toFixed(5):""),10,i.height-28);ctx.font="11px monospace";ctx.fillText(S.op+" - "+(S.pj?.name||""),10,i.height-10);res(c.toDataURL("image/jpeg",.85))};l.onerror=()=>res(img);l.src=S.logoUrl};i.src=img})}

function startGPS(){if(!navigator.geolocation){S.gs="erro";return}S.gs="...";navigator.geolocation.watchPosition(p=>{S.gps={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy};S.gs="ok";render()},()=>{S.gs="erro";render()},{enableHighAccuracy:true,maximumAge:5e3})}

document.getElementById("cam").onchange=async e=>{const f=e.target.files?.[0];if(!f||!S.gps)return;lg("Processando...");const r=new FileReader;r.onload=async ev=>{const w=await wm(ev.target.result),a=await geo(S.gps.lat,S.gps.lng);const endCompleto=a.rua+(a.numero?", "+a.numero:"")+" - "+a.bairro+(a.cep?" ("+a.cep+")":"");S.ph.push({id:Date.now()+"",b64:w,gps:{...S.gps},addr:a,ts:new Date().toISOString(),op:S.op,pj:S.pj.name,note:""});lg("#"+S.ph.length+" "+endCompleto,"ok");render()};r.readAsDataURL(f);e.target.value=""};

document.getElementById("logo").onchange=e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader;r.onload=ev=>{S.logoUrl=ev.target.result;localStorage.setItem("cg_logo",ev.target.result);lg("Logo salva!","ok");render()};r.readAsDataURL(f);e.target.value=""};

async function proc(){S.proc=true;render();lg("Processando "+S.ph.length+" fotos...");const by={};S.ph.forEach(p=>{const k=p.addr.bairro;if(!by[k])by[k]=[];by[k].push(p)});S.cad=[];const dt=new Date().toISOString().split("T")[0];for(const[b,fs]of Object.entries(by)){const br={};fs.forEach(f=>{const r=f.addr.rua;if(!br[r])br[r]=[];br[r].push(f)});let md="# Caderno - "+b+"\n\nProjeto: "+S.pj.name+"\nOperador: "+S.op+"\nData: "+new Date().toLocaleDateString("pt-BR")+"\nCidade: "+fs[0].addr.cidade+"\nEstado: "+fs[0].addr.estado+"\nRegistros: "+fs.length+"\n\n";for(const[r,rf]of Object.entries(br)){md+="## "+r+"\n\n";rf.forEach((f,i)=>{md+="### Reg "+(i+1)+"\n- Endereco: "+f.addr.full+"\n- Rua: "+f.addr.rua+(f.addr.numero?", "+f.addr.numero:"")+"\n- Bairro: "+f.addr.bairro+"\n- CEP: "+(f.addr.cep||"N/A")+"\n- Coord: "+f.gps.lat.toFixed(6)+","+f.gps.lng.toFixed(6)+"\n- GPS: +/-"+f.gps.acc?.toFixed(0)+"m\n- Data: "+new Date(f.ts).toLocaleString("pt-BR")+"\n";if(f.note)md+="- Obs: "+f.note+"\n";md+="\n"})}const fn="Caderno_"+b.replace(/\s/g,"_")+"_"+dt+".md";S.cad.push({b,fn,n:fs.length,ruas:Object.keys(br)});try{await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"write",path:"04_PROJETOS/"+S.pj.f+"/cadernos_campo",fileName:fn,content:md}),redirect:"follow"});lg(fn+" salvo","ok")}catch{lg(fn+" ERRO","err")}}S.done=true;S.proc=false;lg(S.cad.length+" cadernos gerados!","ok");render()}

function selPj(id){const op=document.getElementById("opN")?.value?.trim();if(!op)return alert("Informe o operador");const gk=document.getElementById("gKey")?.value?.trim()||"";S.op=op;S.gkey=gk;if(gk)localStorage.setItem("cg_gkey",gk);S.pj=PJ.find(p=>p.id===id);S.scr="main";startGPS();lg(gk?"Google Maps API ativa":"Usando Nominatim (fallback)",gk?"ok":"i");render()}

function render(){const a=document.getElementById("app");if(S.scr==="setup"){a.innerHTML='<div style="text-align:center;margin-bottom:20px"><div style="font-size:40px">📸</div><h1 style="font-size:22px;font-weight:800;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent">CAMPO GEO</h1><div style="font-size:10px;color:#4a5e80;letter-spacing:2px">LEVANTAMENTO GEORREFERENCIADO</div></div><div class="card"><div style="font-size:12px;color:#94a3b8;margin-bottom:6px">Operador:</div><input id="opN" value="'+S.op+'" placeholder="Nome do operador" style="margin-bottom:12px"><div style="font-size:12px;color:#94a3b8;margin-bottom:6px">Google Maps API Key <span style="color:#475569">(opcional)</span>:</div><input id="gKey" value="'+S.gkey+'" placeholder="AIza... (deixe vazio para usar Nominatim)" style="margin-bottom:4px;font-size:11px"><div style="font-size:9px;color:#475569;margin-bottom:12px">Melhora precisao dos enderecos no Brasil. Sem chave usa OpenStreetMap.</div><div style="font-size:12px;color:#94a3b8;margin-bottom:6px">Logo:</div><div style="display:flex;gap:8px;margin-bottom:8px;align-items:center"><button class="btn" style="background:#1e40af;width:auto;padding:8px 12px;font-size:11px" onclick="document.getElementById(\'logo\').click()">'+(S.logoUrl?"✅ Logo":"📎 Logo")+'</button>'+(S.logoUrl?'<img src="'+S.logoUrl+'" style="height:32px;border-radius:4px">':'')+'<select style="width:auto;font-size:11px;padding:6px;background:#0f172a;color:#e2e8f0;border:1px solid #1e2a4a;border-radius:4px" onchange="S.logoPos=this.value;localStorage.setItem(\'cg_lp\',this.value)"><option value="bottom-right"'+(S.logoPos=="bottom-right"?" selected":"")+'>↘ Inf.Dir</option><option value="bottom-left"'+(S.logoPos=="bottom-left"?" selected":"")+'>↙ Inf.Esq</option><option value="top-right"'+(S.logoPos=="top-right"?" selected":"")+'>↗ Sup.Dir</option><option value="top-left"'+(S.logoPos=="top-left"?" selected":"")+'>↖ Sup.Esq</option></select></div><div style="font-size:12px;color:#94a3b8;margin:12px 0 8px">Projeto:</div>'+PJ.map(p=>'<button class="btn" style="background:#1e40af;margin-bottom:6px" onclick="selPj(\''+p.id+'\')">'+p.name+'</button>').join("")+'</div>';return}const ub=[...new Set(S.ph.map(p=>p.addr.bairro))],ur=[...new Set(S.ph.map(p=>p.addr.rua))];a.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #1e2a4a"><div><h1 style="font-size:16px;font-weight:800;color:#f59e0b;margin:0">CAMPO GEO</h1><div style="font-size:10px;color:#4a5e80">'+S.pj.name+' | '+S.op+'</div></div><div class="gps" style="background:'+(S.gs=="ok"?"#064e3b":"#78350f")+';color:'+(S.gs=="ok"?"#6ee7b7":"#fbbf24")+'">📍 '+(S.gs=="ok"&&S.gps?"±"+S.gps.acc?.toFixed(0)+"m":S.gs)+'</div></div><div style="display:flex;gap:6px;margin-bottom:12px"><div class="stat"><div style="font-size:20px;font-weight:700;color:#3b82f6">'+S.ph.length+'</div><div style="font-size:9px;color:#4a5e80">FOTOS</div></div><div class="stat"><div style="font-size:20px;font-weight:700;color:#10b981">'+ub.length+'</div><div style="font-size:9px;color:#4a5e80">BAIRROS</div></div><div class="stat"><div style="font-size:20px;font-weight:700;color:#f59e0b">'+ur.length+'</div><div style="font-size:9px;color:#4a5e80">RUAS</div></div></div><div class="card"><button class="btn" style="background:'+(S.gs=="ok"?"linear-gradient(135deg,#ef4444,#f59e0b)":"#374151")+';font-size:18px;padding:20px;margin-bottom:8px" onclick="document.getElementById(\'cam\').click()" '+(S.gs!="ok"?"disabled":"")+'>'+(S.gs!="ok"?"⏳ GPS...":"📸 CAPTURAR")+'</button>'+(S.gps?'<div style="font-size:11px;color:#64748b;text-align:center">'+S.gps.lat.toFixed(6)+", "+S.gps.lng.toFixed(6)+'</div>':'')+(S.ph.length>0?'<div style="margin-top:10px;display:flex;gap:8px;align-items:center;background:#0f172a;border-radius:6px;padding:8px"><img src="'+S.ph[S.ph.length-1].b64+'" class="thumb"><div style="flex:1;font-size:11px"><div style="color:#e2e8f0;font-weight:600">'+S.ph[S.ph.length-1].addr.rua+(S.ph[S.ph.length-1].addr.numero?", "+S.ph[S.ph.length-1].addr.numero:"")+'</div><div style="color:#64748b">'+S.ph[S.ph.length-1].addr.bairro+(S.ph[S.ph.length-1].addr.cep?" - "+S.ph[S.ph.length-1].addr.cep:"")+'</div></div></div>':'')+'</div>'+(S.ph.length>0&&!S.done?'<button class="btn" style="background:'+(S.proc?"#374151":"linear-gradient(135deg,#10b981,#059669)")+';margin-bottom:10px" onclick="proc()" '+(S.proc?"disabled":"")+'>'+( S.proc?"⏳...":"✅ FINALIZAR ("+S.ph.length+")")+'</button>':'')+(S.log.length>0?'<div class="log">'+S.log.map(l=>'<div style="color:'+(l.t=="err"?"#fca5a5":l.t=="ok"?"#6ee7b7":"#475569")+'"><span style="color:#1e2a4a">'+l.ts+'</span> '+l.m+'</div>').join("")+'</div>':'')}
render()
</script>
</body>
</html>
