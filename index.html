<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050810;font-family:'JetBrains Mono',monospace;color:#c8d6e5;overflow-x:hidden}
input,select,button{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,8,16,.95);backdrop-filter:blur(16px);border-top:1px solid rgba(30,42,74,.5);display:flex;z-index:100;max-width:520px;margin:0 auto;padding:6px 0 env(safe-area-inset-bottom,6px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border:none;background:none;cursor:pointer;font-size:7px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .2s;position:relative}
.nb .ic{font-size:20px;transition:transform .2s}.nb.on .ic{transform:scale(1.15)}
.cd{background:rgba(17,24,39,.85);backdrop-filter:blur(12px);border:1px solid rgba(30,42,74,.6);border-radius:12px;padding:14px;margin-bottom:10px}
.bt{padding:12px 16px;border-radius:10px;border:none;cursor:pointer;color:#fff;font-weight:700;font-size:13px;font-family:'Outfit',sans-serif;width:100%;letter-spacing:.5px;transition:all .15s}
.bt:active{transform:scale(.97)}
.ip{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(30,42,74,.8);background:rgba(15,23,42,.9);color:#e2e8f0;font-size:13px;box-sizing:border-box;outline:none;font-family:'JetBrains Mono',monospace}
.ip:focus{border-color:#3b82f6}
.bg{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.mo{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:20px;animation:slideUp .3s}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useCallback,useRef,useEffect}=React;
const PJ=[{id:"rio-das-ostras",name:"Rio das Ostras",folder:"RIO_DAS_OSTRAS",center:[-22.527,-41.945],zoom:13},{id:"marica",name:"Maricá",folder:"MARICA",center:[-22.919,-42.818],zoom:13},{id:"implurb",name:"IMPLURB Manaus",folder:"ADESAO_IMPLURB_MANAUS",center:[-3.119,-60.021],zoom:12}];
const API="https://script.google.com/macros/s/AKfycbx8BehYWILdRbQi8mCv4ImGQz1gmD3I7DFESABkaiT-goB1-b-dcDL1IuqjxlDu56QM/exec";
const san=s=>(s||"Sem_dados").replace(/[^a-zA-Z0-9À-ú\s_-]/g,"").replace(/\s+/g,"_").substring(0,60);
const RAIO=100;
const hav=(a,b,c,d)=>{const R=6371e3,t=Math.PI/180,x=Math.sin((c-a)*t/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin((d-b)*t/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))};
function parseExif(ab){try{const dv=new DataView(ab);if(dv.getUint16(0)!==0xFFD8)return null;let o=2;while(o<dv.byteLength-4){const m=dv.getUint16(o);if(m===0xFFE1)return pA1(dv,o+4,dv.getUint16(o+2)-2);if((m&0xFF00)!==0xFF00)break;o+=2+dv.getUint16(o+2)}return null}catch{return null}}
function pA1(dv,s,ml){try{const b=new Uint8Array(dv.buffer,s,Math.min(ml,dv.buffer.byteLength-s));if(!(b[0]===69&&b[1]===120&&b[2]===105&&b[3]===102&&b[4]===0&&b[5]===0))return null;const tb=s+6,le=dv.getUint16(tb)===0x4949;const u16=o=>dv.getUint16(tb+o,le),u32=o=>dv.getUint32(tb+o,le),rat=o=>{const d=u32(o+4);return d===0?0:u32(o)/d};let gO=null,dt=null;const i0=u32(4),ic=u16(i0);for(let i=0;i<ic;i++){const e=i0+2+i*12;if(e+12>ml+6)break;const t=u16(e),c=u32(e+4),v=u32(e+8);if(t===0x8825)gO=v;if(t===0x0132&&c<=20){let x="";for(let j=0;j<c;j++){const ch=dv.getUint8(tb+v+j);if(!ch)break;x+=String.fromCharCode(ch)}dt=x.trim()}}if(!gO)return{dateTime:dt,gps:null};const gc=u16(gO);let lR="",nR="",lV=null,nV=null,aR=0,al=null;for(let i=0;i<gc;i++){const e=gO+2+i*12;if(e+12>ml+6)break;const t=u16(e),v=u32(e+8);switch(t){case 1:lR=String.fromCharCode(dv.getUint8(tb+e+8));break;case 2:lV=[rat(v),rat(v+8),rat(v+16)];break;case 3:nR=String.fromCharCode(dv.getUint8(tb+e+8));break;case 4:nV=[rat(v),rat(v+8),rat(v+16)];break;case 5:aR=dv.getUint8(tb+e+8);break;case 6:al=rat(v);break}}if(!lV||!nV)return{dateTime:dt,gps:null};let lat=lV[0]+lV[1]/60+lV[2]/3600,lng=nV[0]+nV[1]/60+nV[2]/3600;if(lR==="S")lat=-lat;if(nR==="W")lng=-lng;if(Math.abs(lat)>90||Math.abs(lng)>180||(lat===0&&lng===0))return{dateTime:dt,gps:null};return{dateTime:dt,gps:{lat,lng,alt:al!=null?(aR===1?-al:al):null}}}catch{return null}}
const geo=async(lat,lng)=>{try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1&accept-language=pt-BR`);const d=await r.json();const a=d.address||{};return{rua:a.road||a.pedestrian||a.street||"Sem_rua",bairro:a.suburb||a.neighbourhood||a.quarter||a.district||"Sem_bairro",cidade:a.city||a.town||a.municipality||"",full:d.display_name||""}}catch{return{rua:"Sem_dados",bairro:"Sem_dados",cidade:"",full:""}}};
const COR=["#f97316","#3b82f6","#10b981","#a855f7","#ec4899","#eab308","#06b6d4","#ef4444","#84cc16","#6366f1"];

function App(){
const[pj,setPj]=useState(null);const[op,setOp]=useState("");const[ab,setAb]=useState("mapa");
const[cad,setCad]=useState([]);const[ft,setFt]=useState([]);
const[gp,setGp]=useState("idle");const[ga,setGa]=useState(null);
const[lg,setLg]=useState([]);const[sc,setSc]=useState(null);const[ak,setAk]=useState(null);
const[mE,setME]=useState(null);const[mA,setMA]=useState(null);
const fR=useRef(null),iR=useRef(null),wR=useRef(null),mR=useRef(null),mI=useRef(null),mk=useRef([]),zR=useRef([]);
const log=useCallback((m,t="info")=>setLg(p=>[{m,t,ts:new Date().toLocaleTimeString("pt-BR")},...p].slice(0,80)),[]);

useEffect(()=>{if(!pj)return;setGp("buscando");log("Iniciando GPS...");wR.current=navigator.geolocation?.watchPosition(p=>{setGa({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy,ts:new Date().toISOString()});setGp("ativo")},e=>{setGp("erro");log("GPS: "+e.message,"err")},{enableHighAccuracy:true,maximumAge:3e3,timeout:15e3});return()=>{if(wR.current)navigator.geolocation?.clearWatch(wR.current)}},[pj,log]);

useEffect(()=>{if(!pj)return;(async()=>{try{const r=await fetch(`${API}?action=list&path=${encodeURIComponent(`04_PROJETOS/${pj.folder}`)}`,{redirect:"follow"});await r.json();setAk(true);log("API conectada","ok")}catch{setAk(false);log("API offline","err")}})()},[pj,log]);

useEffect(()=>{if(!pj)return;(async()=>{try{const r=await fetch(`${API}?action=read&path=${encodeURIComponent(`04_PROJETOS/${pj.folder}/cadernos_campo`)}&fileName=_plano_missao.json`,{redirect:"follow"});const d=await r.json();if(d.content){const p=JSON.parse(d.content);if(p.cadernos?.length>0){setCad(p.cadernos);log(`Plano carregado: ${p.cadernos.length} cadernos`,"ok")}else if(p.mission?.length>0){const c=[];p.mission.forEach((b,bi)=>b.ruas.forEach(r=>{c.push({id:`c${bi}_${c.length}`,nome:`${b.bairro} - ${r.nome}`,bairro:b.bairro,rua:r.nome,lat:r.lat,lng:r.lng,raio:RAIO,minFotos:r.minFotos||3,cor:COR[c.length%COR.length],fotos:[]})}));setCad(c);log(`Migrado: ${c.length} cadernos`,"ok")}}}catch{log("Sem plano — aguardando planejamento","info")}})()},[pj,log]);

useEffect(()=>{if(!pj||!mR.current||!window.L||ab!=="mapa")return;const t=setTimeout(()=>{if(mI.current){try{mI.current.remove()}catch{}mI.current=null}try{const m=window.L.map(mR.current,{zoomControl:true,attributionControl:false}).setView(pj.center,pj.zoom);window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(m);mI.current=m;setTimeout(()=>m.invalidateSize(),100)}catch(e){log("Erro mapa: "+e.message,"err")}},200);return()=>clearTimeout(t)},[pj,ab]);

useEffect(()=>{const m=mI.current;if(!m||!window.L||ab!=="mapa")return;mk.current.forEach(x=>{try{m.removeLayer(x)}catch{}});mk.current=[];zR.current.forEach(x=>{try{m.removeLayer(x)}catch{}});zR.current=[];
cad.forEach((c,i)=>{if(!c.lat||!c.lng)return;const cr=window.L.circle([c.lat,c.lng],{radius:c.raio||RAIO,color:c.cor,fillColor:c.cor,fillOpacity:.12,weight:2,dashArray:"6 4"}).addTo(m);cr.bindPopup(`<b>📓 ${c.nome}</b><br>Raio: ${c.raio||RAIO}m<br>Fotos: ${c.fotos?.length||0}/${c.minFotos}`);zR.current.push(cr);const lb=window.L.divIcon({className:"",html:`<div style="background:${c.cor};color:#fff;padding:2px 6px;border-radius:4px;font-size:7px;font-weight:700;white-space:nowrap;font-family:monospace;box-shadow:0 2px 8px rgba(0,0,0,.4)">${c.nome.substring(0,18)}</div>`,iconAnchor:[0,-18]});mk.current.push(window.L.marker([c.lat,c.lng],{icon:lb}).addTo(m))});
ft.forEach(f=>{if(!f.gps?.lat)return;const cc=f.caderno?cad.find(c=>c.id===f.caderno):null;const cor=cc?.cor||"#3b82f6";const ic=window.L.divIcon({className:"",html:`<div style="width:10px;height:10px;border-radius:50%;background:${cor};border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,iconSize:[10,10],iconAnchor:[5,5]});const x=window.L.marker([f.gps.lat,f.gps.lng],{icon:ic}).addTo(m);x.bindPopup(`<b>${f.src==="cam"?"📸 Câmera":"📤 Upload"}</b><br>${f.addr?.rua||""}<br>📓 ${cc?.nome||"N/A"}`);mk.current.push(x)});
if(ga){const ic=window.L.divIcon({className:"",html:`<div style="width:18px;height:18px;border-radius:50%;background:rgba(59,130,246,.25);border:2px solid #3b82f6;display:flex;align-items:center;justify-content:center"><div style="width:8px;height:8px;border-radius:50%;background:#3b82f6"></div></div>`,iconSize:[18,18],iconAnchor:[9,9]});mk.current.push(window.L.marker([ga.lat,ga.lng],{icon:ic}).bindPopup("Você está aqui").addTo(m))}
setTimeout(()=>m?.invalidateSize(),50)},[cad,ft,ga,ab]);

const findCad=useCallback((lat,lng)=>{let best=null;cad.forEach(c=>{if(!c.lat||!c.lng)return;const d=hav(lat,lng,c.lat,c.lng);if(d<=(c.raio||RAIO)&&(!best||d<best.dist))best={...c,dist:d}});return best},[cad]);

const salvar=async(foto)=>{const cc=foto.caderno?cad.find(c=>c.id===foto.caderno):null;const b=san(cc?.bairro||foto.addr?.bairro||"Geral"),r=san(cc?.rua||foto.addr?.rua||"Geral");const bp=`04_PROJETOS/${pj.folder}/cadernos_campo/book_imagens/${b}/${r}`;const ts=new Date(foto.ts).toISOString().replace(/[:.]/g,"-").substring(0,19);const fn=`foto_${ts}_${foto.gps.lat.toFixed(5)}_${foto.gps.lng.toFixed(5)}.jpeg`;try{const res=await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"write",path:bp,fileName:fn,content:foto.b64.split(",")[1]||foto.b64,encoding:"base64",mimeType:"image/jpeg"}),redirect:"follow"});const d=await res.json();if(d.error)throw new Error(d.error);return{ok:true,path:`${bp}/${fn}`}}catch(e){return{ok:false,error:e.message}}};

const sync=async(foto)=>{setSc(foto.id);log(`Salvando: ${san(foto.addr?.bairro)}/${san(foto.addr?.rua)}...`);const r=await salvar(foto);if(r.ok){log(`Salvo: ${r.path}`,"ok");setFt(p=>p.map(f=>f.id===foto.id?{...f,synced:true,path:r.path}:f));if(foto.caderno)setCad(p=>p.map(c=>c.id===foto.caderno?{...c,fotos:[...(c.fotos||[]),foto.id]}:c))}else{log(`Falha: ${r.error}`,"err");setFt(p=>p.map(f=>f.id===foto.id?{...f,synced:false}:f))}setSc(null)};

const savePlan=async()=>{try{await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"write",path:`04_PROJETOS/${pj.folder}/cadernos_campo`,fileName:"_plano_missao.json",content:JSON.stringify({version:3,project:pj.name,operator:op,updatedAt:new Date().toISOString(),cadernos:cad},null,2)}),redirect:"follow"});log("Plano salvo","ok")}catch(e){log("Erro: "+e.message,"err")}};

const capturar=async(e)=>{const file=e.target.files?.[0];if(!file)return;if(!ga){log("Aguarde o GPS","err");return}const cc=findCad(ga.lat,ga.lng);if(cad.length>0&&!cc){setMA({lat:ga.lat,lng:ga.lng});log("REJEITADA — fora dos cadernos","err");if(fR.current)fR.current.value="";return}const reader=new FileReader();reader.onload=async(ev)=>{const addr=await geo(ga.lat,ga.lng);const foto={id:Date.now().toString(),b64:ev.target.result,gps:{...ga},addr,ts:new Date().toISOString(),op,caderno:cc?.id||null,src:"cam",synced:null};setFt(p=>[...p,foto]);log(`📸 ${addr.rua}${cc?` → 📓 ${cc.nome}`:""}`,"ok");setTimeout(()=>sync(foto),300)};reader.readAsDataURL(file);if(fR.current)fR.current.value=""};

const importar=async(e)=>{const files=Array.from(e.target.files||[]);if(!files.length)return;let ok=0;const rE=[],rA=[];for(const file of files){try{const ab=await file.arrayBuffer();const exif=parseExif(ab);if(!exif?.gps){rE.push({name:file.name,reason:!exif?"Sem dados EXIF":"Sem GPS nos metadados"});continue}const cc=findCad(exif.gps.lat,exif.gps.lng);if(cad.length>0&&!cc){rA.push({name:file.name});log(`${file.name} — fora dos cadernos`,"err");continue}const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file)});const ts=exif.dateTime?new Date(exif.dateTime.replace(/^(\d{4}):(\d{2}):(\d{2})/,"$1-$2-$3")).toISOString():new Date(file.lastModified).toISOString();const addr=await geo(exif.gps.lat,exif.gps.lng);const foto={id:`up_${Date.now()}_${Math.random().toString(36).substr(2,4)}`,b64,gps:{lat:exif.gps.lat,lng:exif.gps.lng,acc:null},addr,ts,op,caderno:cc?.id||null,src:"up",synced:null,note:file.name};setFt(p=>[...p,foto]);ok++;setTimeout(()=>sync(foto),600*ok);await new Promise(r=>setTimeout(r,250))}catch(err){rE.push({name:file.name,reason:err.message})}}if(rE.length)setME(rE);if(rA.length)setMA({files:rA});log(`Importação: ${ok} aceitas, ${rE.length+rA.length} rejeitadas`,ok>0?"ok":"err");if(iR.current)iR.current.value=""};

const voltar=()=>{if(ft.some(f=>f.synced!==true)&&!window.confirm("Fotos não sincronizadas serão perdidas. Sair?"))return;if(wR.current)navigator.geolocation?.clearWatch(wR.current);if(mI.current){try{mI.current.remove()}catch{}mI.current=null}setPj(null);setFt([]);setCad([]);setGp("idle");setGa(null);setLg([]);setAb("mapa");setAk(null)};

const tA=cad.length,aOk=cad.filter(c=>(c.fotos?.length||0)>=c.minFotos).length,pct=tA>0?Math.round(aOk/tA*100):0,pend=cad.filter(c=>(c.fotos?.length||0)<c.minFotos),fNS=ft.filter(f=>f.synced!==true).length;

// ====== TELA INICIAL ======
if(!pj)return(
<div style={{minHeight:"100vh",padding:14,maxWidth:520,margin:"0 auto",background:"linear-gradient(170deg,#050810 0%,#0a1628 40%,#0d0f1a 100%)"}}>
<div style={{textAlign:"center",paddingTop:30,marginBottom:28}}>
<div style={{width:72,height:72,margin:"0 auto 14px",background:"linear-gradient(135deg,#f97316,#dc2626,#9333ea)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,boxShadow:"0 8px 32px rgba(249,115,22,.3)"}}>🗺️</div>
<h1 style={{fontFamily:"'Outfit',sans-serif",fontSize:28,fontWeight:900,margin:0,background:"linear-gradient(135deg,#f97316,#ef4444,#a855f7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CAMPO GEO</h1>
<div style={{fontSize:9,color:"#475569",letterSpacing:4,textTransform:"uppercase",marginTop:4,fontWeight:600}}>v3 · mapa + cadernos + registro</div>
</div>
<div className="cd">
<div style={{fontSize:10,color:"#64748b",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:1.5}}>Identificação</div>
<input value={op} onChange={e=>setOp(e.target.value)} placeholder="Nome do operador" className="ip" style={{marginBottom:14}}/>
<div style={{fontSize:10,color:"#64748b",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1.5}}>Selecionar Projeto</div>
{PJ.map(p=><button key={p.id} onClick={()=>op.trim().length>=2&&setPj(p)} disabled={op.trim().length<2} className="bt" style={{marginBottom:8,textAlign:"left",paddingLeft:16,background:op.trim().length>=2?"linear-gradient(135deg,#1e40af,#3b82f6)":"#1e293b",opacity:op.trim().length<2?.4:1}}>📁 {p.name}</button>)}
<div style={{marginTop:14,padding:"10px 12px",borderRadius:8,background:"rgba(15,23,42,.6)",border:"1px solid rgba(30,42,74,.4)"}}>
<div style={{fontSize:9,color:"#64748b",fontWeight:600,marginBottom:4}}>API</div>
<div style={{fontSize:11,color:ak===true?"#10b981":ak===false?"#ef4444":"#475569"}}>{ak===true?"✓ Conectada ao vault":ak===false?"✕ Erro de conexão":"● Aguardando seleção do projeto"}</div>
</div></div>
<div style={{textAlign:"center",marginTop:20,fontSize:8,color:"#1e293b"}}>CÉREBRO · BRASIL LIMPO · v3</div>
</div>);

// ====== TELA PRINCIPAL ======
return(
<div style={{minHeight:"100vh",paddingBottom:70,maxWidth:520,margin:"0 auto",background:"linear-gradient(170deg,#050810 0%,#0a1628 40%,#0d0f1a 100%)"}}>
{mE&&<div className="mo"><div style={{background:"#111827",border:"1px solid #7f1d1d",borderRadius:16,padding:20,maxWidth:400,width:"100%",maxHeight:"70vh",overflow:"auto"}}>
<div style={{fontFamily:"'Outfit',sans-serif",fontSize:16,fontWeight:800,color:"#fca5a5",marginBottom:10}}>⛔ Sem GPS nos metadados ({mE.length})</div>
<div style={{fontSize:10,color:"#f87171",lineHeight:1.7,marginBottom:12}}>Fotos descartadas — sem coordenadas GPS no EXIF. Ative a localização no celular antes de fotografar.</div>
{mE.map((r,i)=><div key={i} style={{padding:"6px 10px",marginBottom:4,borderRadius:6,background:"rgba(15,23,42,.8)",border:"1px solid rgba(30,42,74,.4)"}}><div style={{fontSize:11,color:"#e2e8f0",fontWeight:600}}>{r.name}</div><div style={{fontSize:9,color:"#f87171"}}>{r.reason}</div></div>)}
<button onClick={()=>setME(null)} className="bt" style={{background:"linear-gradient(135deg,#dc2626,#991b1b)",marginTop:12}}>FECHAR</button></div></div>}

{mA&&<div className="mo"><div style={{background:"#111827",border:"1px solid #92400e",borderRadius:16,padding:20,maxWidth:420,width:"100%"}}>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{fontSize:32}}>🚫</div><div><div style={{fontFamily:"'Outfit',sans-serif",fontSize:16,fontWeight:800,color:"#fbbf24"}}>Fora da área dos cadernos</div></div></div>
<div style={{background:"rgba(120,53,15,.2)",border:"1px solid rgba(245,158,11,.3)",borderRadius:8,padding:10,marginBottom:14,fontSize:10,color:"#fbbf24",lineHeight:1.7}}>As coordenadas GPS estão fora do <strong>raio de {RAIO}m</strong> de qualquer caderno. O operador precisa estar dentro da área demarcada no mapa para registrar.</div>
<button onClick={()=>setMA(null)} className="bt" style={{background:"linear-gradient(135deg,#f59e0b,#b45309)"}}>ENTENDI — FECHAR</button></div></div>}

<div style={{padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(30,42,74,.5)"}}>
<div style={{display:"flex",alignItems:"center",gap:8}}>
<button onClick={voltar} style={{width:32,height:32,borderRadius:8,border:"1px solid rgba(30,42,74,.6)",background:"rgba(15,23,42,.8)",color:"#94a3b8",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>←</button>
<div><div style={{fontFamily:"'Outfit',sans-serif",fontSize:13,fontWeight:800,color:"#f97316"}}>CAMPO GEO <span style={{fontSize:8,color:"#475569"}}>v3</span></div><div style={{fontSize:7,color:"#475569"}}>{pj.name} · {op}</div></div></div>
<div style={{display:"flex",gap:6}}><span className="bg" style={{background:ak?"rgba(6,78,59,.8)":"rgba(127,29,29,.8)",color:ak?"#6ee7b7":"#fca5a5"}}>{ak?"✓":"✕"} API</span><span className="bg" style={{background:gp==="ativo"?"rgba(6,78,59,.8)":"rgba(127,29,29,.8)",color:gp==="ativo"?"#6ee7b7":"#fca5a5"}}>{gp==="ativo"?"●":"✕"} GPS</span></div></div>

<div style={{padding:"10px 14px"}}>
{cad.length>0&&<div className="cd" style={{padding:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:6}}><span style={{color:"#64748b"}}>Progresso geral</span><span style={{color:pct===100?"#10b981":"#f59e0b",fontWeight:700}}>{pct}%</span></div><div style={{height:6,borderRadius:3,background:"rgba(30,42,74,.4)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:`${pct}%`,background:pct===100?"#10b981":"linear-gradient(90deg,#f59e0b,#f97316)",transition:"width .5s"}}/></div><div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:"#475569",marginTop:4}}><span>{aOk}/{tA} cadernos</span><span>{ft.length} fotos</span><span>Raio: {RAIO}m</span></div></div>}

{ab==="mapa"&&<div>
<div ref={mR} style={{width:"100%",height:340,borderRadius:12,border:"1px solid rgba(30,42,74,.6)",marginBottom:10,background:"#0f172a"}}/>
<div style={{display:"flex",gap:8,justifyContent:"center",fontSize:8,color:"#64748b",marginBottom:10,flexWrap:"wrap"}}>{cad.slice(0,6).map((c,i)=><span key={i}><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:c.cor,marginRight:3,verticalAlign:"middle",border:"1px solid #fff"}}/>📓 {c.nome.substring(0,15)}</span>)}</div>
{cad.map((c,i)=>{const ok=(c.fotos?.length||0)>=c.minFotos;return<div key={i} style={{padding:"8px 12px",marginBottom:4,borderRadius:8,background:"rgba(15,23,42,.5)",borderLeft:`3px solid ${c.cor}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontSize:11,fontWeight:700,color:ok?"#6ee7b7":"#e2e8f0"}}>{ok?"✓":"◯"} {c.nome}</span><div style={{fontSize:8,color:"#475569"}}>{c.bairro} · Raio {c.raio||RAIO}m</div></div><span style={{fontSize:10,color:ok?"#10b981":"#f59e0b",fontWeight:700}}>{c.fotos?.length||0}/{c.minFotos}</span></div>})}
{pend.length>0&&<div style={{marginTop:8,fontSize:9,color:"#fca5a5",fontWeight:600}}>📍 Falta: {pend.map(c=>c.nome).join(", ")}</div>}
{pct===100&&cad.length>0&&<button onClick={()=>{const s=`# MISSÃO — ${pj.name}\nData: ${new Date().toLocaleDateString("pt-BR")}\nOperador: ${op}\nProgresso: 100%\nFotos: ${ft.length}\n\n${cad.map(c=>`## 📓 ${c.nome}\n- ${c.bairro} / ${c.rua}\n- Fotos: ${c.fotos?.length||0}/${c.minFotos} ✓\n`).join("\n")}`;navigator.clipboard?.writeText(s);log("Resumo copiado!","ok")}} className="bt" style={{background:"linear-gradient(135deg,#a855f7,#7c3aed)",marginTop:10,fontSize:14,padding:16}}>📋 EXPORTAR RESUMO FINAL</button>}
</div>}

{ab==="foto"&&<div>
<input ref={fR} type="file" accept="image/*" capture="environment" onChange={capturar} style={{display:"none"}}/>
<button onClick={()=>fR.current?.click()} disabled={gp!=="ativo"} className="bt" style={{background:gp==="ativo"?"linear-gradient(135deg,#f97316,#dc2626)":"#1e293b",opacity:gp!=="ativo"?.4:1,padding:"18px 16px",fontSize:15,marginBottom:10,boxShadow:gp==="ativo"?"0 6px 24px rgba(249,115,22,.3)":"none"}}>{gp!=="ativo"?"Aguardando GPS...":"📸 CAPTURAR FOTO"}</button>
{ga&&<div style={{textAlign:"center",fontSize:9,color:"#475569",marginBottom:10}}>📍 {ga.lat.toFixed(5)}, {ga.lng.toFixed(5)} · Precisão: {ga.acc?.toFixed(0)}m</div>}
{ft.filter(f=>f.src==="cam").length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>{ft.filter(f=>f.src==="cam").slice(-9).map(f=><div key={f.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:`2px solid ${cad.find(c=>c.id===f.caderno)?.cor||"#1e293b"}`}}><img src={f.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}} alt=""/><div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.8))",padding:"6px 4px 2px",fontSize:7,color:"#94a3b8"}}><div style={{fontWeight:700,color:"#fff",fontSize:8}}>📸 {f.addr?.rua?.substring(0,18)}</div></div><div style={{position:"absolute",top:2,right:2,width:10,height:10,borderRadius:"50%",background:f.synced===true?"#10b981":f.synced===false?"#ef4444":"#f59e0b"}}/></div>)}</div>}
</div>}

{ab==="upload"&&<div>
<input ref={iR} type="file" accept="image/jpeg,image/jpg" multiple onChange={importar} style={{display:"none"}}/>
<button onClick={()=>iR.current?.click()} className="bt" style={{background:"linear-gradient(135deg,#7c3aed,#4f46e5)",padding:"18px 16px",fontSize:15,marginBottom:10}}>📤 IMPORTAR DA GALERIA</button>
<div style={{fontSize:10,color:"#64748b",marginBottom:14,lineHeight:1.7,padding:"0 4px"}}>Selecione fotos JPEG com metadados GPS. Fotos sem localização serão descartadas. O sistema classifica cada foto no caderno correto pela geolocalização.</div>
{ft.filter(f=>f.src==="up").length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>{ft.filter(f=>f.src==="up").slice(-9).map(f=><div key={f.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:`2px solid ${cad.find(c=>c.id===f.caderno)?.cor||"#1e293b"}`}}><img src={f.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}} alt=""/><div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.8))",padding:"6px 4px 2px",fontSize:7,color:"#94a3b8"}}><div style={{fontWeight:700,color:"#fff",fontSize:8}}>📤 {(f.note||"").substring(0,18)}</div></div><div style={{position:"absolute",top:2,right:2,width:10,height:10,borderRadius:"50%",background:f.synced===true?"#10b981":f.synced===false?"#ef4444":"#f59e0b"}}/></div>)}</div>}
</div>}

{ab==="caderno"&&<div>
{cad.length===0?<div className="cd" style={{textAlign:"center",padding:30}}><div style={{fontSize:32,marginBottom:10}}>📓</div><div style={{fontSize:12,color:"#64748b"}}>Nenhum caderno criado.</div><div style={{fontSize:10,color:"#475569",marginTop:6}}>Aguardando entrega do planejamento geográfico.</div></div>
:cad.map((c,i)=>{const ok=(c.fotos?.length||0)>=c.minFotos;const cf=ft.filter(f=>f.caderno===c.id);return<div key={i} className="cd" style={{borderLeft:`3px solid ${c.cor}`}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
<div><div style={{fontFamily:"'Outfit',sans-serif",fontWeight:800,fontSize:13,color:c.cor}}>📓 {c.nome}</div><div style={{fontSize:9,color:"#475569"}}>{c.bairro} · {c.rua} · Raio {c.raio||RAIO}m</div></div>
<span className="bg" style={{background:ok?"rgba(6,78,59,.6)":"rgba(120,53,15,.6)",color:ok?"#6ee7b7":"#fbbf24"}}>{ok?"✓ Completo":`${c.fotos?.length||0}/${c.minFotos}`}</span></div>
{cf.length>0&&<div style={{display:"flex",gap:4,overflow:"auto",paddingBottom:4}}>{cf.slice(-6).map(f=><img key={f.id} src={f.b64} style={{width:50,height:50,borderRadius:6,objectFit:"cover",border:`1px solid ${c.cor}44`,flexShrink:0}} alt=""/>)}</div>}
{cf.length===0&&<div style={{fontSize:9,color:"#334155"}}>Nenhuma foto registrada</div>}
</div>})}
</div>}

{ab==="enviar"&&<div>
<div className="cd" style={{textAlign:"center"}}>
<div style={{fontSize:13,fontWeight:700,color:fNS>0?"#f59e0b":"#10b981",marginBottom:8}}>{fNS>0?`${fNS} foto(s) pendente(s)`:"✓ Tudo sincronizado"}</div>
{fNS>0&&<button onClick={async()=>{for(const f of ft.filter(x=>x.synced!==true)){await sync(f);await new Promise(r=>setTimeout(r,500))}savePlan()}} className="bt" style={{background:"linear-gradient(135deg,#3b82f6,#1e40af)",marginBottom:8}}>📡 SINCRONIZAR TUDO</button>}
<button onClick={savePlan} className="bt" style={{background:"linear-gradient(135deg,#10b981,#059669)"}}>💾 SALVAR PLANO</button></div>
<div style={{fontSize:10,color:"#64748b",marginTop:10,fontWeight:600}}>⚡ Log do sistema</div>
<div style={{background:"rgba(5,8,16,.9)",border:"1px solid rgba(30,42,74,.4)",borderRadius:8,padding:8,maxHeight:300,overflow:"auto",marginTop:6}}>{lg.map((l,i)=><div key={i} style={{fontSize:9,padding:"2px 0",color:l.t==="err"?"#fca5a5":l.t==="ok"?"#6ee7b7":"#475569",borderBottom:"1px solid rgba(30,42,74,.1)"}}><span style={{color:"#1e293b",marginRight:6}}>{l.ts}</span>{l.m}</div>)}</div></div>}
</div>

<div className="bnav">{[{k:"mapa",i:"🗺️",l:"MAPA"},{k:"foto",i:"📸",l:"FOTO"},{k:"upload",i:"📤",l:"UPLOAD"},{k:"caderno",i:"📓",l:"CADERNO"},{k:"enviar",i:"📡",l:"ENVIAR"}].map(t=><button key={t.k} onClick={()=>{setAb(t.k);if(t.k==="mapa")setTimeout(()=>mI.current?.invalidateSize(),100)}} className={`nb ${ab===t.k?"on":""}`} style={{color:ab===t.k?"#f97316":"#475569"}}><span className="ic">{t.i}</span>{t.l}{t.k==="enviar"&&fNS>0&&<span style={{position:"absolute",top:2,right:"50%",marginRight:-14,width:14,height:14,borderRadius:"50%",background:"#ef4444",color:"#fff",fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{fNS}</span>}</button>)}</div>
</div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
