const{useState,useCallback,useRef,useEffect}=React;
const PROJECTS=[
{id:"rio-das-ostras",name:"Rio das Ostras",folder:"RIO_DAS_OSTRAS",center:[-22.527,-41.945],zoom:13},
{id:"marica",name:"Maricá",folder:"MARICA",center:[-22.919,-42.818],zoom:13},

const sanitize=(s)=>(s||"Sem_dados").replace(/[^a-zA-Z0-9À-ú\s_-]/g,"").replace(/\s+/g,"_").substring(0,60);
const RAIO_MAX=100;
function haversineM(a,b,c,d){const R=6371e3,t=Math.PI/180,dL=(c-a)*t,dN=(d-b)*t,x=Math.sin(dL/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function parseExif(ab){try{const dv=new DataView(ab);if(dv.getUint16(0)!==0xFFD8)return null;let o=2;while(o<dv.byteLength-4){const m=dv.getUint16(o);if(m===0xFFE1)return parseApp1(dv,o+4,dv.getUint16(o+2)-2);if((m&0xFF00)!==0xFF00)break;o+=2+dv.getUint16(o+2)}}catch{}return null}
function parseApp1(dv,start,ml){try{const b=new Uint8Array(dv.buffer,start,Math.min(ml,dv.buffer.byteLength-start));if(!(b[0]===0x45&&b[1]===0x78&&b[2]===0x69&&b[3]===0x66&&b[4]===0&&b[5]===0))return null;const tb=start+6,le=dv.getUint16(tb)===0x4949;const u16=o=>dv.getUint16(tb+o,le),u32=o=>dv.getUint32(tb+o,le);const rat=o=>{const d=u32(o+4);return d===0?0:u32(o)/d};const str=(o,n)=>{let s="";for(let i=0;i<n;i++){const c=dv.getUint8(tb+o+i);if(!c)break;s+=String.fromCharCode(c)}return s.trim()};let gO=null,dt=null;const i0=u32(4),ic=u16(i0);for(let i=0;i<ic;i++){const e=i0+2+i*12;if(e+12>ml+6)break;const t=u16(e),c=u32(e+4),v=u32(e+8);if(t===0x8825)gO=v;if(t===0x0132&&c<=20)dt=str(v,c)}if(!gO)return{dateTime:dt,gps:null};const gc=u16(gO);let lR="",nR="",lV=null,nV=null,aR=0,al=null;for(let i=0;i<gc;i++){const e=gO+2+i*12;if(e+12>ml+6)break;const t=u16(e),v=u32(e+8);switch(t){case 1:lR=String.fromCharCode(dv.getUint8(tb+e+8));break;case 2:lV=[rat(v),rat(v+8),rat(v+16)];break;case 3:nR=String.fromCharCode(dv.getUint8(tb+e+8));break;case 4:nV=[rat(v),rat(v+8),rat(v+16)];break;case 5:aR=dv.getUint8(tb+e+8);break;case 6:al=rat(v);break}}if(!lV||!nV)return{dateTime:dt,gps:null};let lat=lV[0]+lV[1]/60+lV[2]/3600,lng=nV[0]+nV[1]/60+nV[2]/3600;if(lR==="S")lat=-lat;if(nR==="W")lng=-lng;if(Math.abs(lat)>90||Math.abs(lng)>180||(lat===0&&lng===0))return{dateTime:dt,gps:null};return{dateTime:dt,gps:{lat,lng,altitude:al!=null?(aR===1?-al:al):null}}}catch{return null}}
const F={P:"plan",M:"map",FO:"photo",PR:"process"};
function App(){
const[proj,setProj]=useState(null);
const[oper,setOper]=useState("");
const[fase,setFase]=useState(F.P);
const[missao,setMissao]=useState([]);
const[fotos,setFotos]=useState([]);
const[gps,setGps]=useState("idle");
const[gpsAt,setGpsAt]=useState(null);
const[logs,setLogs]=useState([]);
const[aba,setAba]=useState("mapa");
const[sincr,setSincr]=useState(null);
const[captur,setCaptur]=useState(false);
const[importando,setImportando]=useState(false);
const[rejExif,setRejExif]=useState([]);
const[mostRejExif,setMostRejExif]=useState(false);
const[rejArea,setRejArea]=useState([]);
const[mostRejArea,setMostRejArea]=useState(false);
const[novoBairro,setNovoBairro]=useState("");
const[novaRua,setNovaRua]=useState({bi:-1,nome:"",lat:"",lng:"",min:3});
const[leafOk,setLeafOk]=useState(false);
const[mapK,setMapK]=useState(0);
const fRef=useRef(null),iRef=useRef(null),wRef=useRef(null),mRef=useRef(null),mIRef=useRef(null),mkRef=useRef([]);
const log=useCallback((m,t="info")=>setLogs(p=>[{m,t,ts:new Date().toLocaleTimeString("pt-BR")},...p].slice(0,100)),[]);
useEffect(()=>{if(!proj)return;setGps("buscando");log("Iniciando GPS...");wRef.current=navigator.geolocation?.watchPosition(p=>{setGpsAt({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy,alt:p.coords.altitude,ts:new Date().toISOString()});setGps("ativo")},e=>{setGps("erro");log("GPS: "+e.message,"err")},{enableHighAccuracy:true,maximumAge:3e3,timeout:15e3});return()=>{if(wRef.current)navigator.geolocation?.clearWatch(wRef.current)}},[proj,log]);
useEffect(()=>{if(!proj||leafOk)return;if(window.L){setLeafOk(true);return}const c=document.createElement("link");c.rel="stylesheet";c.href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";document.head.appendChild(c);const j=document.createElement("script");j.src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";document.head.appendChild(j);const p=setInterval(()=>{if(window.L){clearInterval(p);setLeafOk(true);log("Mapa carregado","ok")}},200);return()=>clearInterval(p)},[proj,leafOk,log]);
useEffect(()=>{if(!leafOk||!proj||aba!=="mapa")return;const t=setTimeout(()=>{if(!mRef.current)return;if(mIRef.current){try{mIRef.current.remove()}catch{}mIRef.current=null}try{const m=window.L.map(mRef.current,{zoomControl:true,attributionControl:false}).setView(proj.center,proj.zoom);window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(m);mIRef.current=m;setTimeout(()=>m.invalidateSize(),100)}catch(e){log("Erro no mapa: "+e.message,"err")}},150);return()=>clearTimeout(t)},[leafOk,proj,aba,mapK,log]);
useEffect(()=>{const m=mIRef.current;if(!m||!window.L||aba!=="mapa")return;mkRef.current.forEach(x=>{try{m.removeLayer(x)}catch{}});mkRef.current=[];const mk=(lt,ln,h,sz,pp)=>{const ic=window.L.divIcon({className:"",html:h,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});const x=window.L.marker([lt,ln],{icon:ic}).addTo(m);if(pp)x.bindPopup(pp);mkRef.current.push(x)};missao.forEach(b=>b.ruas.forEach(r=>{if(!r.lat||!r.lng)return;const ok=(r.fotos?.length||0)>=r.minFotos,parc=(r.fotos?.length||0)>0&&!ok,cor=ok?"#10b981":parc?"#f59e0b":"#ef4444";mk(r.lat,r.lng,`<div style="width:14px;height:14px;border-radius:50%;background:${cor};border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>`,14,`<b>${r.nome}</b><br>${b.bairro}<br>${r.fotos?.length||0}/${r.minFotos} fotos<br><span style="color:${cor};font-weight:700">${ok?"Completo":parc?"Parcial":"Pendente"}</span>`)}));fotos.forEach(p=>{if(!p.gps?.lat)return;mk(p.gps.lat,p.gps.lng,`<div style="width:8px;height:8px;border-radius:50%;background:#3b82f6;border:1.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,8,`<b>${p.source==="import"?"Importada":"Captura"}</b><br>${p.address?.rua||""}<br>${new Date(p.timestamp).toLocaleString("pt-BR")}`)});if(gpsAt)mk(gpsAt.lat,gpsAt.lng,`<div style="width:18px;height:18px;border-radius:50%;background:rgba(59,130,246,.25);border:2px solid #3b82f6;display:flex;align-items:center;justify-content:center"><div style="width:8px;height:8px;border-radius:50%;background:#3b82f6"></div></div>`,18,"Você está aqui")},[missao,fotos,gpsAt,aba]);
const voltar=()=>{if(fotos.some(p=>p.synced!==true)&&!window.confirm("Fotos não sincronizadas serão perdidas. Sair mesmo assim?"))return;if(wRef.current)navigator.geolocation?.clearWatch(wRef.current);if(mIRef.current){try{mIRef.current.remove()}catch{}mIRef.current=null}setProj(null);setFotos([]);setMissao([]);setFase(F.P);setGps("idle");setGpsAt(null);setLogs([]);setAba("mapa");setRejExif([]);setMostRejExif(false);setRejArea([]);setMostRejArea(false);setLeafOk(false);setMapK(0)};
const geocode=async(lat,lng)=>{try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1&accept-language=pt-BR`);const d=await r.json();const a=d.address||{};return{rua:a.road||a.pedestrian||a.street||"Sem_rua",bairro:a.suburb||a.neighbourhood||a.quarter||a.district||"Sem_bairro",cidade:a.city||a.town||a.municipality||"Sem_cidade",estado:a.state||"",full:d.display_name||""}}catch{return{rua:"Sem_dados",bairro:"Sem_dados",cidade:"Sem_dados",estado:"",full:""}}};
const achaAlvo=useCallback((lat,lng)=>{let best=null;missao.forEach(b=>b.ruas.forEach(r=>{if(!r.lat||!r.lng)return;const d=haversineM(lat,lng,r.lat,r.lng);if(!best||d<best.dist)best={bairro:b.bairro,rua:r.nome,lat:r.lat,lng:r.lng,dist:d,minFotos:r.minFotos}}));return best},[missao]);
const validaArea=useCallback((lat,lng,label)=>{const temCoord=missao.some(b=>b.ruas.some(r=>r.lat&&r.lng));if(!temCoord)return{ok:true};const alvo=achaAlvo(lat,lng);if(!alvo)return{ok:true};if(alvo.dist<=RAIO_MAX)return{ok:true,target:alvo};return{ok:false,target:alvo,reason:`Foto a ${Math.round(alvo.dist)}m do ponto mais próximo (${alvo.rua}, ${alvo.bairro}). Raio máximo: ${RAIO_MAX}m.`,label}},[missao,achaAlvo]);
const salvarJpeg=async(foto)=>{const b=sanitize(foto.address.bairro),r=sanitize(foto.address.rua);const bp=`04_PROJETOS/${proj.folder}/cadernos_campo/book_imagens/${b}/${r}`;const ts=new Date(foto.timestamp).toISOString().replace(/[:.]/g,"-").substring(0,19);const fn=`foto_${ts}_${foto.gps.lat.toFixed(5)}_${foto.gps.lng.toFixed(5)}.jpeg`;try{const res=await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"write",path:bp,fileName:fn,content:foto.base64.split(",")[1]||foto.base64,encoding:"base64",mimeType:"image/jpeg"}),redirect:"follow"});const d=await res.json();if(d.error)throw new Error(d.error);return{ok:true,path:`${bp}/${fn}`}}catch(e){return{ok:false,error:e.message}}};
const sincronizar=async(foto)=>{setSincr(foto.id);log(`Salvando: ${sanitize(foto.address.bairro)}/${sanitize(foto.address.rua)}...`);const r=await salvarJpeg(foto);if(r.ok){log(`Salvo: ${r.path}`,"ok");setFotos(prev=>prev.map(p=>p.id===foto.id?{...p,synced:true,drivePath:r.path}:p));setMissao(prev=>prev.map(b=>({...b,ruas:b.ruas.map(rua=>{if(rua.nome===foto.address?.rua||sanitize(rua.nome)===sanitize(foto.address?.rua))return{...rua,fotos:[...(rua.fotos||[]),foto.id]};if(rua.lat&&rua.lng&&foto.gps){const dist=haversineM(rua.lat,rua.lng,foto.gps.lat,foto.gps.lng);if(dist<RAIO_MAX)return{...rua,fotos:[...(rua.fotos||[]),foto.id]}}return rua})})))}else{log(`Falha: ${r.error}`,"err");setFotos(prev=>prev.map(p=>p.id===foto.id?{...p,synced:false}:p))}setSincr(null)};
const capturar=async(e)=>{const file=e.target.files?.[0];if(!file||!gpsAt){if(!gpsAt)log("Aguarde o GPS estabilizar","err");return}setCaptur(true);const chk=validaArea(gpsAt.lat,gpsAt.lng,"Câmera");if(!chk.ok){setRejArea(p=>[...p,{name:`Foto ${new Date().toLocaleTimeString("pt-BR")}`,lat:gpsAt.lat,lng:gpsAt.lng,...chk}]);setMostRejArea(true);log(`REJEITADA — ${Math.round(chk.target.dist)}m do ponto (máx ${RAIO_MAX}m)`,"err");setCaptur(false);if(fRef.current)fRef.current.value="";return}const reader=new FileReader();reader.onload=async(ev)=>{const addr=await geocode(gpsAt.lat,gpsAt.lng);const foto={id:Date.now().toString(),base64:ev.target.result,gps:{...gpsAt},address:addr,timestamp:new Date().toISOString(),operator:oper,project:proj.name,note:"",synced:null,source:"camera"};setFotos(prev=>[...prev,foto]);log(`Foto capturada: ${addr.rua}, ${addr.bairro}`,"ok");setCaptur(false);setTimeout(()=>sincronizar(foto),300)};reader.readAsDataURL(file);if(fRef.current)fRef.current.value=""};
const importar=async(e)=>{const files=Array.from(e.target.files||[]);if(!files.length)return;setImportando(true);let ac=0;const rE=[],rA=[];for(const file of files){try{const ab=await file.arrayBuffer();const exif=parseExif(ab);if(!exif?.gps){rE.push({name:file.name,reason:!exif?"Sem dados EXIF":"Sem GPS nos metadados"});continue}const chk=validaArea(exif.gps.lat,exif.gps.lng,file.name);if(!chk.ok){rA.push({name:file.name,lat:exif.gps.lat,lng:exif.gps.lng,...chk});log(`${file.name} — fora da área (${Math.round(chk.target.dist)}m)`,"err");continue}const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file)});const ts=exif.dateTime?new Date(exif.dateTime.replace(/^(\d{4}):(\d{2}):(\d{2})/,"$1-$2-$3")).toISOString():new Date(file.lastModified).toISOString();const addr=await geocode(exif.gps.lat,exif.gps.lng);const foto={id:`imp_${Date.now()}_${Math.random().toString(36).substr(2,4)}`,base64:b64,gps:{lat:exif.gps.lat,lng:exif.gps.lng,accuracy:null,altitude:exif.gps.altitude},address:addr,timestamp:ts,operator:oper,project:proj.name,note:`Importado: ${file.name}`,synced:null,source:"import"};setFotos(prev=>[...prev,foto]);ac++;setTimeout(()=>sincronizar(foto),600*ac);await new Promise(r=>setTimeout(r,250))}catch(err){rE.push({name:file.name,reason:err.message})}}if(rE.length){setRejExif(rE);setMostRejExif(true)}if(rA.length){setRejArea(p=>[...p,...rA]);setMostRejArea(true)}log(`Importação: ${ac} aceitas, ${rE.length+rA.length} rejeitadas${rA.length?` (${rA.length} fora da área)`:""}`,ac>0?"ok":"err");setImportando(false);if(iRef.current)iRef.current.value=""};
const salvarPlano=async()=>{try{await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"write",path:`04_PROJETOS/${proj.folder}/cadernos_campo`,fileName:"_plano_missao.json",content:JSON.stringify({version:2,project:proj.name,operator:oper,updatedAt:new Date().toISOString(),mission:missao},null,2)}),redirect:"follow"});log("Plano salvo no vault","ok")}catch(e){log("Erro ao salvar: "+e.message,"err")}};
useEffect(()=>{if(!proj)return;(async()=>{try{const r=await fetch(`${API}?action=read&path=${encodeURIComponent(`04_PROJETOS/${proj.folder}/cadernos_campo`)}&fileName=_plano_missao.json`,{redirect:"follow"});const d=await r.json();if(d.content){const p=JSON.parse(d.content);if(p.mission?.length>0){setMissao(p.mission);setFase(F.M);log(`Plano carregado: ${p.mission.length} bairros`,"ok")}}}catch{log("Sem plano salvo — crie um novo","info")}})()},[proj,log]);
const addBairro=()=>{if(!novoBairro.trim())return;setMissao(p=>[...p,{bairro:novoBairro.trim(),ruas:[]}]);log(`+ Bairro: ${novoBairro.trim()}`);setNovoBairro("")};
const addRua=()=>{if(novaRua.bi<0||!novaRua.nome.trim())return;setMissao(prev=>prev.map((b,i)=>i===novaRua.bi?{...b,ruas:[...b.ruas,{nome:novaRua.nome.trim(),lat:parseFloat(novaRua.lat)||null,lng:parseFloat(novaRua.lng)||null,minFotos:novaRua.min||3,fotos:[]}]}:b));log(`+ Rua: ${novaRua.nome.trim()}`);setNovaRua(p=>({...p,nome:"",lat:"",lng:""}))};

const totalAlvos=missao.reduce((a,b)=>a+b.ruas.length,0);
const alvosOk=missao.reduce((a,b)=>a+b.ruas.filter(r=>(r.fotos?.length||0)>=r.minFotos).length,0);
const totalFotosNec=missao.reduce((a,b)=>a+b.ruas.reduce((c,r)=>c+r.minFotos,0),0);
const pct=totalAlvos>0?Math.round(alvosOk/totalAlvos*100):0;
const aprovado=fase!==F.P&&missao.length>0;
const tudo100=totalAlvos>0&&alvosOk===totalAlvos;
const exportar=()=>{let s=`# MISSÃO — ${proj.name}\n\nData: ${new Date().toLocaleDateString("pt-BR")}\nOperador: ${oper}\nProgresso: ${pct}% (${alvosOk}/${totalAlvos})\nFotos: ${fotos.length}\n\n`;missao.forEach(b=>{s+=`## ${b.bairro}\n`;b.ruas.forEach(r=>{s+=`- ${r.nome}: ${r.fotos?.length||0}/${r.minFotos} fotos ${(r.fotos?.length||0)>=r.minFotos?"✓":"✕"}\n`});s+="\n"});return s};
