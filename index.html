<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Campo GEO</title>
<link rel="manifest" href="manifest.json">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0a0e1a;color:#c8d6e5;min-height:100vh;padding:16px}.card{background:#111827;border:1px solid #1e2a4a;border-radius:10px;padding:14px;margin-bottom:10px}.btn{padding:12px 16px;border-radius:8px;border:none;cursor:pointer;color:#fff;font-weight:700;font-size:14px;width:100%}input,select{width:100%;padding:10px;border-radius:6px;border:1px solid #1e2a4a;background:#0f172a;color:#e2e8f0;font-size:14px}canvas{display:none}.gps{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}.stat{flex:1;background:#0f172a;border:1px solid #1e2a4a;border-radius:6px;padding:8px;text-align:center}.thumb{width:60px;height:60px;object-fit:cover;border-radius:4px}.log{background:#050810;border:1px solid #1e2a4a;border-radius:6px;padding:8px;max-height:120px;overflow:auto;font-size:10px}</style>
</head>
<body>
<div id="app"></div><canvas id="wc"></canvas>
<input type="file" id="cam" accept="image/*" capture="environment" style="display:none">
<input type="file" id="logo" accept="image/png,image/jpeg" style="display:none">
<script>
var API="https://script.google.com/macros/s/AKfycbx8BehYWILdRbQi8mCv4ImGQz1gmD3I7DFESABkaiT-goB1-b-dcDL1IuqjxlDu56QM/exec";
var PJ=[{id:"rio",name:"Rio das Ostras",f:"RIO_DAS_OSTRAS_RJ"},{id:"mar",name:"Marica",f:"MARICA"},{id:"imp",name:"IMPLURB Manaus",f:"ADESAO_IMPLURB_MANAUS"},{id:"g2",name:"Grupo 2 Cabos",f:"ADESAO_CIDADES_GRUPO_2_CABOS"}];
var S={scr:"setup",pj:null,op:"",ph:[],gps:null,gs:"idle",log:[],cad:[],done:false,proc:false,logoUrl:localStorage.getItem("cg_logo")||null,logoPos:localStorage.getItem("cg_lp")||"bottom-right",gkey:localStorage.getItem("cg_gkey")||""};
function lg(m,t){t=t||"i";S.log.push({m:m,t:t,ts:new Date().toLocaleTimeString("pt-BR")});render();}
async function geo(la,lo){
  var key=S.gkey||localStorage.getItem("cg_gkey")||"";
  if(key){try{
    var r=await fetch("https://maps.googleapis.com/maps/api/geocode/json?latlng="+la+","+lo+"&key="+key+"&language=pt-BR");
    var d=await r.json();
    if(d.status==="OK"&&d.results&&d.results.length>0){
      var c=d.results[0].address_components;
      var get=function(t){var f=c.find(function(x){return x.types.indexOf(t)>=0});return f?f.long_name:""};
      return{rua:get("route")||"Sem rua",numero:get("street_number")||"",bairro:get("sublocality_level_1")||get("sublocality")||get("neighborhood")||"Sem bairro",cidade:get("administrative_area_level_2")||get("locality")||"Sem cidade",estado:get("administrative_area_level_1")||"",cep:get("postal_code")||"",full:d.results[0].formatted_address||""};}
  }catch(e){lg("Google API erro: "+e.message,"err")}}
  try{var r2=await fetch("https://nominatim.openstreetmap.org/reverse?lat="+la+"&lon="+lo+"&format=json&addressdetails=1");
    var d2=await r2.json();
    return{rua:d2.address&&d2.address.road||"?",numero:d2.address&&d2.address.house_number||"",bairro:d2.address&&(d2.address.suburb||d2.address.neighbourhood)||"?",cidade:d2.address&&(d2.address.city||d2.address.town)||"?",estado:"",cep:"",full:d2.display_name||""}
  }catch(e2){return{rua:"?",numero:"",bairro:"?",cidade:"?",estado:"",cep:"",full:"?"}}}
function wm(img){return new Promise(function(res){if(!S.logoUrl)return res(img);var c=document.getElementById("wc"),ctx=c.getContext("2d"),i=new Image();i.onload=function(){c.width=i.width;c.height=i.height;ctx.drawImage(i,0,0);var l=new Image();l.onload=function(){var mw=i.width*.25,sc=Math.min(mw/l.width,1),lw=l.width*sc,lh=l.height*sc,p=20;var x=i.width-lw-p,y=i.height-lh-p;if(S.logoPos=="top-left"){x=p;y=p}else if(S.logoPos=="top-right"){x=i.width-lw-p;y=p}else if(S.logoPos=="bottom-left"){x=p}ctx.globalAlpha=.85;ctx.drawImage(l,x,y,lw,lh);ctx.globalAlpha=1;ctx.fillStyle="rgba(0,0,0,.6)";ctx.fillRect(0,i.height-46,i.width,46);ctx.fillStyle="#fff";ctx.font="bold 13px monospace";ctx.fillText(new Date().toLocaleString("pt-BR")+"  |  "+(S.gps?S.gps.lat.toFixed(5)+","+S.gps.lng.toFixed(5):""),10,i.height-28);ctx.font="11px monospace";ctx.fillText(S.op+" - "+(S.pj?S.pj.name:""),10,i.height-10);res(c.toDataURL("image/jpeg",.85))};l.onerror=function(){res(img)};l.src=S.logoUrl};i.src=img})}
function startGPS(){if(!navigator.geolocation){S.gs="erro";return}S.gs="...";navigator.geolocation.watchPosition(function(p){S.gps={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy};S.gs="ok";render()},function(){S.gs="erro";render()},{enableHighAccuracy:true,maximumAge:5e3})}
document.getElementById("cam").onchange=async function(e){var f=e.target.files&&e.target.files[0];if(!f||!S.gps)return;lg("Processando...");var r=new FileReader();r.onload=async function(ev){var w=await wm(ev.target.result),a=await geo(S.gps.lat,S.gps.lng);S.ph.push({id:Date.now()+"",b64:w,gps:{lat:S.gps.lat,lng:S.gps.lng,acc:S.gps.acc},addr:a,ts:new Date().toISOString(),op:S.op,pj:S.pj.name});lg("#"+S.ph.length+" "+a.rua+", "+a.bairro,"ok");render()};r.readAsDataURL(f);e.target.value=""};
document.getElementById("logo").onchange=function(e){var f=e.target.files&&e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){S.logoUrl=ev.target.result;localStorage.setItem("cg_logo",ev.target.result);lg("Logo salva!","ok");render()};r.readAsDataURL(f);e.target.value=""};
function saveGKey(){var v=(document.getElementById("gkeyIn")||{}).value||"";v=v.trim();S.gkey=v;localStorage.setItem("cg_gkey",v);lg(v?"API Key Google salva!":"Key removida, usando Nominatim","ok");render()}
async function proc(){S.proc=true;render();lg("Processando "+S.ph.length+" fotos...");var by={};S.ph.forEach(function(p){var k=p.addr.bairro;if(!by[k])by[k]=[];by[k].push(p)});S.cad=[];var dt=new Date().toISOString().split("T")[0];for(var b in by){if(!by.hasOwnProperty(b))continue;var fs=by[b];var br={};fs.forEach(function(f){var r=f.addr.rua;if(!br[r])br[r]=[];br[r].push(f)});var md="# Caderno - "+b+"\n\nProjeto: "+S.pj.name+"\nOperador: "+S.op+"\nData: "+new Date().toLocaleDateString("pt-BR")+"\nCidade: "+fs[0].addr.cidade+"\nRegistros: "+fs.length+"\n\n";for(var r in br){if(!br.hasOwnProperty(r))continue;var rf=br[r];md+="## "+r+"\n\n";for(var i=0;i<rf.length;i++){var f=rf[i];md+="### Reg "+(i+1)+"\n- Coord: "+f.gps.lat.toFixed(6)+","+f.gps.lng.toFixed(6)+"\n- Prec: +/-"+(f.gps.acc?f.gps.acc.toFixed(0):"?")+"m\n- Data: "+new Date(f.ts).toLocaleString("pt-BR")+"\n- End: "+f.addr.full+"\n\n"}}var fn="Caderno_"+b.replace(/\s/g,"_")+"_"+dt+".md";S.cad.push({b:b,fn:fn,n:fs.length});try{await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"write",path:"04_PROJETOS/"+S.pj.f+"/cadernos_campo",fileName:fn,content:md}),redirect:"follow"});lg(fn+" salvo","ok")}catch(e){lg(fn+" ERRO","err")}}S.done=true;S.proc=false;lg(S.cad.length+" cadernos!","ok");render()}
function selPj(id){var op=(document.getElementById("opN")||{}).value||"";op=op.trim();if(!op)return alert("Informe o operador");S.op=op;S.pj=PJ.find(function(p){return p.id===id});S.scr="main";startGPS();render()}
function render(){var a=document.getElementById("app"),hk=S.gkey?"\u2705":"\u26a0\ufe0f";if(S.scr==="setup"){a.innerHTML='<div style="text-align:center;margin-bottom:20px"><div style="font-size:40px">\ud83d\udcf8</div><h1 style="font-size:22px;font-weight:800;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent">CAMPO GEO</h1><div style="font-size:10px;color:#4a5e80;letter-spacing:2px">LEVANTAMENTO GEORREFERENCIADO</div></div><div class="card"><div style="font-size:12px;color:#94a3b8;margin-bottom:6px">Operador:</div><input id="opN" placeholder="Nome" value="'+S.op+'" style="margin-bottom:12px"><div style="font-size:12px;color:#94a3b8;margin-bottom:6px">Google Maps API Key '+hk+':</div><div style="display:flex;gap:6px;margin-bottom:8px"><input id="gkeyIn" type="password" placeholder="Cole a API Key" value="'+S.gkey+'" style="flex:1;font-size:12px"><button class="btn" style="background:#1e40af;width:auto;padding:8px 12px;font-size:11px" onclick="saveGKey()">Salvar</button></div><div style="font-size:10px;color:#475569;margin-bottom:12px">'+(S.gkey?'\u2705 Google Maps ativo':'\u26a0\ufe0f Sem key = Nominatim (menos preciso)')+'</div><div style="font-size:12px;color:#94a3b8;margin-bottom:6px">Logo:</div><div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn" style="background:#1e40af;width:auto;padding:8px 12px;font-size:11px" onclick="document.getElementById(\'logo\').click()">'+(S.logoUrl?"\u2705 Logo":"\ud83d\udcce Logo")+'</button>'+(S.logoUrl?'<img src="'+S.logoUrl+'" style="height:32px;border-radius:4px">':'')+'</div><div style="font-size:12px;color:#94a3b8;margin:8px 0">Projeto:</div>'+PJ.map(function(p){return'<button class="btn" style="background:#1e40af;margin-bottom:6px" onclick="selPj(\''+p.id+'\')">'+p.name+'</button>'}).join("")+'</div>';return}var ub=new Set(S.ph.map(function(p){return p.addr.bairro}));a.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #1e2a4a"><div><h1 style="font-size:16px;font-weight:800;color:#f59e0b;margin:0">CAMPO GEO</h1><div style="font-size:10px;color:#4a5e80">'+S.pj.name+' | '+S.op+'</div></div><div class="gps" style="background:'+(S.gs=="ok"?"#064e3b":"#78350f")+';color:'+(S.gs=="ok"?"#6ee7b7":"#fbbf24")+'">\ud83d\udccd '+(S.gs=="ok"&&S.gps?"\u00b1"+S.gps.acc.toFixed(0)+"m":S.gs)+'</div></div><div style="display:flex;gap:6px;margin-bottom:12px"><div class="stat"><div style="font-size:20px;font-weight:700;color:#3b82f6">'+S.ph.length+'</div><div style="font-size:9px;color:#4a5e80">FOTOS</div></div><div class="stat"><div style="font-size:20px;font-weight:700;color:#10b981">'+ub.size+'</div><div style="font-size:9px;color:#4a5e80">BAIRROS</div></div></div><div class="card"><button class="btn" style="background:'+(S.gs=="ok"?"linear-gradient(135deg,#ef4444,#f59e0b)":"#374151")+';font-size:18px;padding:20px;margin-bottom:8px" onclick="document.getElementById(\'cam\').click()" '+(S.gs!="ok"?"disabled":"")+'>'+(S.gs!="ok"?"\u23f3 GPS...":"\ud83d\udcf8 CAPTURAR")+'</button>'+(S.gps?'<div style="font-size:11px;color:#64748b;text-align:center">'+S.gps.lat.toFixed(6)+","+S.gps.lng.toFixed(6)+'</div>':'')+(S.ph.length>0?'<div style="margin-top:10px;display:flex;gap:8px;align-items:center;background:#0f172a;border-radius:6px;padding:8px"><img src="'+S.ph[S.ph.length-1].b64+'" class="thumb"><div style="flex:1;font-size:11px"><div style="color:#e2e8f0;font-weight:600">'+S.ph[S.ph.length-1].addr.rua+'</div><div style="color:#64748b">'+S.ph[S.ph.length-1].addr.bairro+'</div></div></div>':'')+'</div>'+(S.ph.length>0&&!S.done?'<button class="btn" style="background:'+(S.proc?"#374151":"linear-gradient(135deg,#10b981,#059669)")+';margin-bottom:10px" onclick="proc()" '+(S.proc?"disabled":"")+'>'+(S.proc?"\u23f3...":"\u2705 FINALIZAR ("+S.ph.length+")")+'</button>':'')+(S.log.length>0?'<div class="log">'+S.log.map(function(l){return'<div style="color:'+(l.t=="err"?"#fca5a5":l.t=="ok"?"#6ee7b7":"#475569")+'">'+l.ts+' '+l.m+'</div>'}).join("")+'</div>':'')}
render();
</script>
</body>
</html>
