*{margin:0;padding:0;box-sizing:border-box}body{background:#050810;font-family:'JetBrains Mono',monospace;color:#c8d6e5;overflow-x:hidden}input,select,button{font-family:inherit}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useCallback,useRef,useEffect}=React;
const PJ=[{id:"rio-das-ostras",name:"Rio das Ostras",folder:"RIO_DAS_OSTRAS",center:[-22.527,-41.945],zoom:13},{id:"marica",name:"Maric\u00e1",folder:"MARICA",center:[-22.919,-42.818],zoom:13},{id:"implurb",name:"IMPLURB Manaus",folder:"ADESAO_IMPLURB_MANAUS",center:[-3.119,-60.021],zoom:12}];
const API="https://script.google.com/macros/s/AKfycbx8BehYWILdRbQi8mCv4ImGQz1gmD3I7DFESABkaiT-goB1-b-dcDL1IuqjxlDu56QM/exec";
const san=s=>(s||"Sem_dados").replace(/[^a-zA-Z0-9\u00C0-\u00FA\s_-]/g,"").replace(/\s+/g,"_").substring(0,60);

function parseExif(ab){try{const dv=new DataView(ab);if(dv.getUint16(0)!==0xFFD8)return null;let o=2;while(o<dv.byteLength-4){const m=dv.getUint16(o);if(m===0xFFE1)return pA1(dv,o+4,dv.getUint16(o+2)-2);if((m&0xFF00)!==0xFF00)break;o+=2+dv.getUint16(o+2)}return null}catch{return null}}
function pA1(dv,s,ml){try{const b=new Uint8Array(dv.buffer,s,Math.min(ml,dv.buffer.byteLength-s));if(!(b[0]===69&&b[1]===120&&b[2]===105&&b[3]===102&&b[4]===0&&b[5]===0))return null;const tb=s+6,le=dv.getUint16(tb)===0x4949;const u16=o=>dv.getUint16(tb+o,le),u32=o=>dv.getUint32(tb+o,le),rat=o=>{const d=u32(o+4);return d===0?0:u32(o)/d};let gO=null,dt=null;const i0=u32(4),ic=u16(i0);for(let i=0;i<ic;i++){const e=i0+2+i*12;if(e+12>ml+6)break;const t=u16(e),c=u32(e+4),v=u32(e+8);if(t===0x8825)gO=v;if(t===0x0132&&c<=20){let x="";for(let j=0;j<c;j++){const ch=dv.getUint8(tb+v+j);if(!ch)break;x+=String.fromCharCode(ch)}dt=x.trim()}}if(!gO)return{dateTime:dt,gps:null};const gc=u16(gO);let lR="",nR="",lV=null,nV=null,aR=0,al=null;for(let i=0;i<gc;i++){const e=gO+2+i*12;if(e+12>ml+6)break;const t=u16(e),v=u32(e+8);switch(t){case 1:lR=String.fromCharCode(dv.getUint8(tb+e+8));break;case 2:lV=[rat(v),rat(v+8),rat(v+16)];break;case 3:nR=String.fromCharCode(dv.getUint8(tb+e+8));break;case 4:nV=[rat(v),rat(v+8),rat(v+16)];break;case 5:aR=dv.getUint8(tb+e+8);break;case 6:al=rat(v);break}}if(!lV||!nV)return{dateTime:dt,gps:null};let lat=lV[0]+lV[1]/60+lV[2]/3600,lng=nV[0]+nV[1]/60+nV[2]/3600;if(lR==="S")lat=-lat;if(nR==="W")lng=-lng;if(Math.abs(lat)>90||Math.abs(lng)>180||(lat===0&&lng===0))return{dateTime:dt,gps:null};return{dateTime:dt,gps:{lat,lng,alt:al!=null?(aR===1?-al:al):null}}}catch{return null}}
const geo=async(lat,lng)=>{try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1&accept-language=pt-BR`);const d=await r.json();const a=d.address||{};return{rua:a.road||a.pedestrian||a.street||"Sem_rua",bairro:a.suburb||a.neighbourhood||a.quarter||a.district||"Sem_bairro"}}catch{return{rua:"Sem_dados",bairro:"Sem_dados"}}};

function App(){
const[pj,setPj]=useState(null);const[op,setOp]=useState("");const[ab,setAb]=useState("mapa");
const[ft,setFt]=useState([]);
const[gp,setGp]=useState("idle");const[ga,setGa]=useState(null);
const[lg,setLg]=useState([]);const[ak,setAk]=useState(null);
const[mE,setME]=useState(null);const[mR2,setMR2]=useState(0);const[ldSync,setLdSync]=useState(false);
const fR=useRef(null),iR=useRef(null),wR=useRef(null),mR=useRef(null),mI=useRef(null),lyR=useRef([]);
const log=useCallback((m,t="info")=>setLg(p=>[{m,t,ts:new Date().toLocaleTimeString("pt-BR")},...p].slice(0,80)),[]);
const isDup=(gps,ts,name)=>ft.some(f=>{if(name&&f.note===name)return true;if(!f.gps?.lat||!gps?.lat)return false;const dLat=Math.abs(f.gps.lat-gps.lat),dLng=Math.abs(f.gps.lng-gps.lng);if(dLat>0.0001||dLng>0.0001)return false;return Math.abs(new Date(f.ts)-new Date(ts))/1000<10});

useEffect(()=>{if(!pj)return;setGp("buscando");log("Iniciando GPS...");wR.current=navigator.geolocation?.watchPosition(p=>{setGa({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy});setGp("ativo")},e=>{setGp("erro");log("GPS: "+e.message,"err")},{enableHighAccuracy:true,maximumAge:3e3,timeout:15e3});return()=>{if(wR.current)navigator.geolocation?.clearWatch(wR.current)}},[pj,log]);
const loadSynced=useCallback(async(folder)=>{try{setLdSync(true);const bp=`04_PROJETOS/${folder}/cadernos_campo/book_imagens`;const lf=async(p)=>{try{const r=await fetch(`${API}?action=list&path=${encodeURIComponent(p)}`,{redirect:"follow"});return await r.json()}catch{return{folders:[],files:[]}}};const root=await lf(bp);if(!root.folders?.length){log("Nenhuma foto anterior encontrada");return}let loaded=[];for(const bairro of root.folders){const bPath=`${bp}/${bairro}`;const bData=await lf(bPath);if(bData.folders?.length){for(const rua of bData.folders){const rPath=`${bPath}/${rua}`;const rData=await lf(rPath);if(rData.files?.length){for(const file of rData.files){const m=file.name.match(/foto_(.+?)_([-\d.]+)_([-\d.]+)\.\w+/);if(m){const lat=parseFloat(m[2]),lng=parseFloat(m[3]);if(!isNaN(lat)&&!isNaN(lng)&&Math.abs(lat)<=90&&Math.abs(lng)<=180){loaded.push({id:`sync_${loaded.length}_${Date.now()}`,b64:"",gps:{lat,lng},addr:{bairro:bairro.replace(/_/g," "),rua:rua.replace(/_/g," ")},ts:m[1].replace(/-/g,":").substring(0,19),op:"",src:"sync",synced:true,note:file.name})}}}}}}if(loaded.length>0){setFt(prev=>{const existing=new Set(prev.map(f=>`${f.gps?.lat?.toFixed(4)}_${f.gps?.lng?.toFixed(4)}`));const newOnes=loaded.filter(l=>!existing.has(`${l.gps.lat.toFixed(4)}_${l.gps.lng.toFixed(4)}`));return[...prev,...newOnes]});log(`${loaded.length} foto(s) anteriores carregadas no mapa`,"ok")}setLdSync(false)}catch(e){setLdSync(false);log("Erro ao carregar fotos anteriores: "+e.message,"err")}},[log]);
useEffect(()=>{if(!pj)return;(async()=>{try{const r=await fetch(`${API}?action=list&path=${encodeURIComponent(`04_PROJETOS/${pj.folder}`)}`,{redirect:"follow"});await r.json();setAk(true);log("API conectada","ok");await loadSynced(pj.folder)}catch{setAk(false);log("API offline","err")}})()},[pj,log,loadSynced]);
useEffect(()=>{if(!pj||!mR.current||!window.L)return;if(mI.current)return;const t=setTimeout(()=>{try{const m=window.L.map(mR.current,{zoomControl:true,attributionControl:false}).setView(pj.center,pj.zoom);window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(m);mI.current=m;setMR2(v=>v+1);setTimeout(()=>m.invalidateSize(),100)}catch(e){log("Erro mapa: "+e.message,"err")}},200);return()=>clearTimeout(t)},[pj]);
useEffect(()=>{if(ab==="mapa"&&mI.current)setTimeout(()=>{mI.current.invalidateSize();setMR2(v=>v+1)},150)},[ab]);
useEffect(()=>{const m=mI.current;if(!m||!window.L)return;lyR.current.forEach(x=>{try{m.removeLayer(x)}catch{}});lyR.current=[];
ft.forEach(f=>{if(!f.gps?.lat)return;const clr=f.src==="sync"?"#10b981":f.src==="cam"?"#f97316":"#a855f7";const dot=window.L.circleMarker([f.gps.lat,f.gps.lng],{radius:6,color:"#fff",fillColor:clr,fillOpacity:1,weight:2}).addTo(m);dot.bindPopup(`<b>${f.src==="sync"?"\u2705 J\u00e1 enviada":f.src==="cam"?"\ud83d\udcf8 C\u00e2mera":"\ud83d\udce4 Upload"}</b><br>${f.addr?.rua||""}<br>${f.addr?.bairro||""}<br><small>${f.ts?new Date(f.ts).toLocaleString("pt-BR"):""}</small><br><span style="color:${f.synced===true?"#10b981":"#f59e0b"}">${f.synced===true?"\u2713 Enviada":"\u23f3 Pendente"}</span>`);lyR.current.push(dot)});
if(ga){const ic=window.L.divIcon({className:"",html:`<div style="width:20px;height:20px;border-radius:50%;background:rgba(59,130,246,.3);border:3px solid #3b82f6;display:flex;align-items:center;justify-content:center"><div style="width:8px;height:8px;border-radius:50%;background:#3b82f6"></div></div>`,iconSize:[20,20],iconAnchor:[10,10]});lyR.current.push(window.L.marker([ga.lat,ga.lng],{icon:ic}).bindPopup("Voc\u00ea est\u00e1 aqui").addTo(m))}},[ft,ga,mR2]);

const salvar=async(foto)=>{const b=san(foto.addr?.bairro||"Geral"),r=san(foto.addr?.rua||"Geral");const bp=`04_PROJETOS/${pj.folder}/cadernos_campo/book_imagens/${b}/${r}`;const ts=new Date(foto.ts).toISOString().replace(/[:.]/g,"-").substring(0,19);const fn=`foto_${ts}_${foto.gps.lat.toFixed(5)}_${foto.gps.lng.toFixed(5)}.jpeg`;try{const res=await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"write",path:bp,fileName:fn,content:foto.b64.split(",")[1]||foto.b64,encoding:"base64",mimeType:"image/jpeg"}),redirect:"follow"});const d=await res.json();if(d.error)throw new Error(d.error);return{ok:true,path:`${bp}/${fn}`}}catch(e){return{ok:false,error:e.message}}};
const sync=async(foto)=>{log("Salvando...");const r=await salvar(foto);if(r.ok){log(`\u2713 ${r.path}`,"ok");setFt(p=>p.map(f=>f.id===foto.id?{...f,synced:true}:f))}else{log(`\u2715 ${r.error}`,"err");setFt(p=>p.map(f=>f.id===foto.id?{...f,synced:false}:f))}};
const capturar=async(e)=>{const file=e.target.files?.[0];if(!file||!ga)return;if(isDup(ga,new Date().toISOString())){log("\u26a0 Foto duplicada (mesmo local/momento) \u2014 ignorada","err");if(fR.current)fR.current.value="";return}const reader=new FileReader();reader.onload=async(ev)=>{const addr=await geo(ga.lat,ga.lng);const foto={id:Date.now().toString(),b64:ev.target.result,gps:{...ga},addr,ts:new Date().toISOString(),op,src:"cam",synced:null};setFt(p=>[...p,foto]);log(`\ud83d\udcf8 ${addr.rua}, ${addr.bairro}`,"ok");setTimeout(()=>sync(foto),300)};reader.readAsDataURL(file);if(fR.current)fR.current.value=""};
const importar=async(e)=>{const files=Array.from(e.target.files||[]);if(!files.length)return;let ok=0;const rE=[];for(const file of files){try{const ab=await file.arrayBuffer();const exif=parseExif(ab);if(!exif?.gps){rE.push({name:file.name,reason:"Sem GPS nos metadados"});continue}if(isDup(exif.gps,new Date(file.lastModified).toISOString(),file.name)){rE.push({name:file.name,reason:"Foto duplicada (j\u00e1 importada)"});continue}const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file)});const addr=await geo(exif.gps.lat,exif.gps.lng);const foto={id:`up_${Date.now()}_${Math.random().toString(36).substr(2,4)}`,b64,gps:{lat:exif.gps.lat,lng:exif.gps.lng},addr,ts:new Date(file.lastModified).toISOString(),op,src:"up",synced:null,note:file.name};setFt(p=>[...p,foto]);ok++;setTimeout(()=>sync(foto),600*ok);await new Promise(r=>setTimeout(r,200))}catch(err){rE.push({name:file.name,reason:err.message})}}if(rE.length)setME(rE);log(`Importa\u00e7\u00e3o: ${ok} aceitas, ${rE.length} rejeitadas`,ok>0?"ok":"err");if(iR.current)iR.current.value=""};
const voltar=()=>{if(ft.some(f=>f.synced!==true&&f.src!=="sync")&&!window.confirm("Fotos n\u00e3o sincronizadas ser\u00e3o perdidas. Sair?"))return;if(wR.current)navigator.geolocation?.clearWatch(wR.current);if(mI.current){try{mI.current.remove()}catch{}}mI.current=null;setPj(null);setFt([]);setGp("idle");setGa(null);setLg([]);setAb("mapa");setAk(null)};
const fNS=ft.filter(f=>f.synced!==true&&f.src!=="sync").length;

if(!pj)return(
<div style={{minHeight:"100vh",padding:16,maxWidth:520,margin:"0 auto",background:"linear-gradient(170deg,#050810 0%,#0a1628 40%,#0d0f1a 100%)"}}>
<div style={{textAlign:"center",paddingTop:30,marginBottom:28}}>
<div style={{width:80,height:80,margin:"0 auto 16px",background:"linear-gradient(135deg,#f97316,#dc2626,#9333ea)",borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,boxShadow:"0 8px 32px rgba(249,115,22,.3)"}}>&#x1f5fa;&#xfe0f;</div>
<h1 style={{fontFamily:"'Outfit',sans-serif",fontSize:30,fontWeight:900,margin:0,background:"linear-gradient(135deg,#f97316,#ef4444,#a855f7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CAMPO GEO</h1>
<div style={{fontSize:10,color:"#475569",letterSpacing:4,textTransform:"uppercase",marginTop:4,fontWeight:600}}>v3.1 &#xb7; registro fotogr&#xe1;fico</div></div>
<div className="cd" style={{padding:20}}>
<div style={{fontSize:11,color:"#64748b",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1.5}}>Identifica&#xe7;&#xe3;o</div>
<input value={op} onChange={e=>setOp(e.target.value)} placeholder="Nome do operador" className="ip" style={{marginBottom:16}}/>
<div style={{fontSize:11,color:"#64748b",marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1.5}}>Selecionar Projeto</div>
{PJ.map(p=><button key={p.id} onClick={()=>op.trim().length>=2&&setPj(p)} disabled={op.trim().length<2} className="bt" style={{marginBottom:10,textAlign:"left",paddingLeft:18,background:op.trim().length>=2?"linear-gradient(135deg,#1e40af,#3b82f6)":"#1e293b",opacity:op.trim().length<2?.4:1,fontSize:16}}>&#x1f4c1; {p.name}</button>)}
<div style={{marginTop:16,padding:"12px 14px",borderRadius:10,background:"rgba(15,23,42,.6)",border:"1px solid rgba(30,42,74,.4)"}}>
<div style={{fontSize:10,color:"#64748b",fontWeight:600,marginBottom:4}}>API</div>
<div style={{fontSize:12,color:ak===true?"#10b981":ak===false?"#ef4444":"#475569"}}>{ak===true?"&#x2713; Conectada ao vault":ak===false?"&#x2715; Erro de conex&#xe3;o":"&#x25cf; Aguardando projeto"}</div>
</div></div></div>);

return(
<div style={{minHeight:"100vh",paddingBottom:80,maxWidth:520,margin:"0 auto",background:"linear-gradient(170deg,#050810 0%,#0a1628 40%,#0d0f1a 100%)"}}>
{mE&&<div className="mo"><div style={{background:"#111827",border:"1px solid #7f1d1d",borderRadius:16,padding:20,maxWidth:400,width:"100%",maxHeight:"70vh",overflow:"auto"}}>
<div style={{fontFamily:"'Outfit',sans-serif",fontSize:18,fontWeight:800,color:"#fca5a5",marginBottom:10}}>&#x26d4; Fotos rejeitadas</div>
{mE.map((r,i)=><div key={i} style={{padding:"8px 10px",marginBottom:4,borderRadius:8,background:"rgba(15,23,42,.8)"}}><span style={{fontSize:12,color:"#e2e8f0",fontWeight:600}}>{r.name}</span> &#x2014; <span style={{fontSize:10,color:"#f87171"}}>{r.reason}</span></div>)}
<button onClick={()=>setME(null)} className="bt" style={{background:"linear-gradient(135deg,#dc2626,#991b1b)",marginTop:12}}>FECHAR</button></div></div>}
<div style={{padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(30,42,74,.5)"}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<button onClick={voltar} style={{width:36,height:36,borderRadius:10,border:"1px solid rgba(30,42,74,.6)",background:"rgba(15,23,42,.8)",color:"#94a3b8",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>&#x2190;</button>
<div><div style={{fontFamily:"'Outfit',sans-serif",fontSize:15,fontWeight:800,color:"#f97316"}}>CAMPO GEO <span style={{fontSize:9,color:"#475569"}}>v3.1</span></div><div style={{fontSize:9,color:"#475569"}}>{pj.name} &#xb7; {op}</div></div></div>
<div style={{display:"flex",gap:6}}><span className="bg" style={{background:ak?"rgba(6,78,59,.8)":"rgba(127,29,29,.8)",color:ak?"#6ee7b7":"#fca5a5"}}>{ak?"&#x2713;":"&#x2715;"} API</span><span className="bg" style={{background:gp==="ativo"?"rgba(6,78,59,.8)":"rgba(127,29,29,.8)",color:gp==="ativo"?"#6ee7b7":"#fca5a5"}}>{gp==="ativo"?"&#x25cf;":"&#x2715;"} GPS</span></div></div>
<div style={{padding:"12px 16px"}}>
{ft.length>0&&<div className="cd" style={{padding:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11}}><span style={{color:"#64748b"}}>{ft.filter(f=>f.src!=="sync").length} nova(s) &#xb7; {ft.filter(f=>f.src==="sync").length} anterior(es)</span><span style={{color:fNS>0?"#f59e0b":"#10b981",fontWeight:700}}>{fNS>0?`${fNS} pendente(s)`:"&#x2713; Tudo enviado"}</span></div></div>}
{ab==="mapa"&&<div>
<div ref={mR} style={{width:"100%",height:400,borderRadius:14,border:"1px solid rgba(30,42,74,.6)",marginBottom:12,background:"#0f172a"}}/>
{ft.length===0&&!ldSync&&<div style={{textAlign:"center",padding:20,fontSize:12,color:"#475569"}}>Fotos registradas aparecer&#xe3;o como pontos no mapa</div>}
{ldSync&&<div style={{textAlign:"center",padding:20,fontSize:12,color:"#f59e0b"}}>&#x23f3; Carregando fotos anteriores do Drive...</div>}
{ft.length>0&&<div style={{textAlign:"center",fontSize:10,color:"#475569"}}>&#x1f7e0; c&#xe2;mera &#xb7; &#x1f7e3; upload &#xb7; &#x1f7e2; j&#xe1; enviada &#xb7; pontos permanecem at&#xe9; fechar projeto</div>}
</div>}
{ab==="foto"&&<div>
<input ref={fR} type="file" accept="image/*" capture="environment" onChange={capturar} style={{display:"none"}}/>
<button onClick={()=>fR.current?.click()} disabled={gp!=="ativo"} className="bt" style={{background:gp==="ativo"?"linear-gradient(135deg,#f97316,#dc2626)":"#1e293b",opacity:gp!=="ativo"?.4:1,padding:"20px 16px",fontSize:18,marginBottom:12,boxShadow:gp==="ativo"?"0 6px 24px rgba(249,115,22,.3)":"none"}}>{gp!=="ativo"?"Aguardando GPS...":"&#x1f4f8; CAPTURAR FOTO"}</button>
{ga&&<div style={{textAlign:"center",fontSize:10,color:"#475569",marginBottom:12}}>&#x1f4cd; {ga.lat.toFixed(5)}, {ga.lng.toFixed(5)} &#xb7; Precis&#xe3;o: {ga.acc?.toFixed(0)}m</div>}
{ft.filter(f=>f.src==="cam").length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{ft.filter(f=>f.src==="cam").slice(-9).map(f=><div key={f.id} style={{position:"relative",borderRadius:10,overflow:"hidden",border:`2px solid ${f.synced===true?"#10b98144":"#f9731644"}`}}><img src={f.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}} alt=""/><div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,.85))",padding:"6px",fontSize:8,color:"#fff",fontWeight:600}}>{f.addr?.rua?.substring(0,22)}</div><div style={{position:"absolute",top:3,right:3,width:12,height:12,borderRadius:"50%",background:f.synced===true?"#10b981":f.synced===false?"#ef4444":"#f59e0b",border:"1px solid rgba(255,255,255,.3)"}}/></div>)}</div>}
</div>}
{ab==="upload"&&<div>
<input ref={iR} type="file" accept="image/jpeg,image/jpg" multiple onChange={importar} style={{display:"none"}}/>
<button onClick={()=>iR.current?.click()} className="bt" style={{background:"linear-gradient(135deg,#7c3aed,#4f46e5)",padding:"20px 16px",fontSize:18,marginBottom:12}}>&#x1f4e4; IMPORTAR DA GALERIA</button>
<div style={{fontSize:11,color:"#64748b",marginBottom:16,lineHeight:1.7}}>JPEG com GPS. Sem localiza&#xe7;&#xe3;o = descartada. Duplicadas = rejeitadas.</div>
{ft.filter(f=>f.src==="up").length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{ft.filter(f=>f.src==="up").slice(-9).map(f=><div key={f.id} style={{position:"relative",borderRadius:10,overflow:"hidden",border:`2px solid ${f.synced===true?"#10b98144":"#a855f744"}`}}><img src={f.b64} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}} alt=""/><div style={{position:"absolute",top:3,right:3,width:12,height:12,borderRadius:"50%",background:f.synced===true?"#10b981":f.synced===false?"#ef4444":"#f59e0b",border:"1px solid rgba(255,255,255,.3)"}}/></div>)}</div>}
</div>}
{ab==="enviar"&&<div>
<div className="cd" style={{textAlign:"center",padding:20}}>
<div style={{fontSize:15,fontWeight:700,color:fNS>0?"#f59e0b":"#10b981",marginBottom:10}}>{fNS>0?`${fNS} foto(s) pendente(s)`:"&#x2713; Tudo sincronizado"}</div>
{fNS>0&&<button onClick={async()=>{for(const f of ft.filter(x=>x.synced!==true&&x.src!=="sync")){await sync(f);await new Promise(r=>setTimeout(r,500))}}} className="bt" style={{background:"linear-gradient(135deg,#3b82f6,#1e40af)",marginBottom:10,fontSize:16}}>&#x1f4e1; SINCRONIZAR TUDO</button>}
</div>
<div style={{fontSize:11,color:"#64748b",marginTop:10,fontWeight:600}}>&#x26a1; Log</div>
<div style={{background:"rgba(5,8,16,.9)",border:"1px solid rgba(30,42,74,.4)",borderRadius:10,padding:10,maxHeight:350,overflow:"auto",marginTop:6}}>{lg.map((l,i)=><div key={i} style={{fontSize:10,padding:"3px 0",color:l.t==="err"?"#fca5a5":l.t==="ok"?"#6ee7b7":"#475569",borderBottom:"1px solid rgba(30,42,74,.1)"}}><span style={{color:"#1e293b",marginRight:6}}>{l.ts}</span>{l.m}</div>)}</div></div>}
</div>
<div className="bnav">{[{k:"mapa",i:"&#x1f5fa;&#xfe0f;",l:"MAPA"},{k:"foto",i:"&#x1f4f8;",l:"FOTO"},{k:"upload",i:"&#x1f4e4;",l:"UPLOAD"},{k:"enviar",i:"&#x1f4e1;",l:"ENVIAR"}].map(t=><button key={t.k} onClick={()=>{setAb(t.k)}} className={`nb ${ab===t.k?"on":""}`} style={{color:ab===t.k?"#f97316":"#475569"}}><span className="ic" dangerouslySetInnerHTML={{__html:t.i}}/>{t.l}{t.k==="enviar"&&fNS>0&&<span style={{position:"absolute",top:2,right:"50%",marginRight:-16,width:16,height:16,borderRadius:"50%",background:"#ef4444",color:"#fff",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{fNS}</span>}</button>)}</div>
</div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
